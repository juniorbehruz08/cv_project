{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - CV Maker</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=20260605-hover-create-2">
</head>
<body class="auth-page" data-page-title-key="login_page_title">
    <main class="auth-shell">
        <div class="auth-top">
            <a class="brand auth-brand" href="{% url 'resume:demo' %}">
                <span class="brand-mark">CV</span>
                <span data-i18n="brand">CV Maker</span>
            </a>

            <div class="language-switcher" aria-label="Language selector">
                <button class="lang-btn is-active" type="button" data-lang="en">EN</button>
                <button class="lang-btn" type="button" data-lang="uz">UZ</button>
                <button class="lang-btn" type="button" data-lang="ru">RU</button>
            </div>
        </div>

        <a class="back-link" href="{% url 'resume:demo' %}" data-i18n="back">Back</a>

        <section class="auth-card">
            <div class="section-heading">
                <p data-i18n="account">Account</p>
                <h1 data-i18n="login">Login</h1>
            </div>

            {% if messages %}
                <div class="messages">
                    {% for message in messages %}
                        <p class="message {{ message.tags }}">{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}

            <form class="account-form" method="post">
                {% csrf_token %}
                {{ form.non_field_errors }}

                <label>
                    <span data-i18n="username">Username</span>
                    {{ form.username }}
                    {{ form.username.errors }}
                </label>

                <label>
                    <span data-i18n="password">Password</span>
                    {{ form.password }}
                    {{ form.password.errors }}
                </label>

                <button class="primary-btn" type="submit" data-i18n="login">Login</button>
            </form>

            <p class="auth-switch"><span data-i18n="no_account">No account yet?</span> <a href="{% url 'resume:register' %}" data-i18n="create_one">Create one</a></p>
        </section>
    </main>
    <script src="{% static 'js/main.js' %}?v=20260605-hover-create-2"></script>
</body>
</html>
