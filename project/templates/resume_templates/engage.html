{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Taylor Parker - Engage Resume Builder</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#d9d9d9;font-family:"Segoe UI",Arial,sans-serif;color:#1f2433}
.resume{width:850px;height:1125px;margin:24px auto;background:#fff;position:relative;overflow:hidden;padding:36px 36px 30px}
.resume:before{content:"";position:absolute;inset:-120px -100px auto -120px;height:340px;opacity:.36;background:repeating-radial-gradient(ellipse at 82% 0%,rgba(19,126,99,.36) 0 1px,transparent 1px 12px);transform:rotate(-4deg);pointer-events:none}
.resume:after{content:"";position:absolute;right:-155px;bottom:-190px;width:760px;height:600px;opacity:.35;background:repeating-radial-gradient(ellipse at 22% 48%,rgba(19,126,99,.36) 0 1px,transparent 1px 13px);transform:rotate(-14deg);pointer-events:none}
.content{position:relative;z-index:2}
.header{display:grid;grid-template-columns:132px 1fr;column-gap:26px;align-items:start;margin-bottom:34px}
.photo{width:132px;height:132px;border-radius:8px;object-fit:cover;background:#c8c8c8;box-shadow:0 1px 3px rgba(0,0,0,.22)}
h1{font-size:39px;line-height:1;font-weight:800;letter-spacing:-1.1px;color:#1f253c;margin-top:5px}
.subtitle{font-size:17px;color:#00785e;margin-top:10px;margin-bottom:22px}
.contact{display:grid;grid-template-columns:145px 145px 1fr;row-gap:7px;column-gap:10px;font-size:12px;color:#69707b}
.contact span{white-space:nowrap}.contact .wide{grid-column:span 2}
.bar-title{background:#eef6f3;color:#08765c;font-size:20px;font-weight:800;padding:10px 14px;margin:22px 0 14px}
p{font-size:12.5px;line-height:1.48;color:#505864}
.job{margin-bottom:20px}.job-head{display:flex;justify-content:space-between;gap:20px;margin-bottom:9px}
h3{font-size:15px;line-height:1.2;font-weight:800;color:#1e2534;margin-bottom:4px}
.company,.school{color:#00785e;font-size:14px;line-height:1.25;margin-bottom:3px}
.place{color:#505864;font-size:12px}.date{color:#505864;font-size:12px;text-align:right;line-height:1.45;min-width:150px}
ul{padding-left:17px}li{font-size:12.2px;line-height:1.42;color:#505864;margin-bottom:4px}
.education{display:grid;grid-template-columns:1fr;gap:18px}
.edu-meta{display:flex;gap:32px;color:#505864;font-size:12px;margin-top:8px}
.skills-grid{display:grid;grid-template-columns:1fr 1fr 1fr;column-gap:34px;row-gap:18px;margin-top:10px}
.skill{display:grid;grid-template-columns:92px 1fr;align-items:start;column-gap:12px}
.skill-name{font-size:12px;color:#505864;padding-top:2px}
.dots{display:flex;gap:5px;margin-bottom:4px}
.dot{width:13px;height:13px;border-radius:50%;background:#d8ddd9}
.dot.filled{background:#0a7c61}
.level{font-size:11px;color:#505864;text-align:right;padding-right:2px}

.download-pdf-btn{position:fixed;right:24px;bottom:24px;z-index:9999;height:44px;border:0;border-radius:999px;background:#0a7c61;color:#fff;font:inherit;font-size:14px;font-weight:800;padding:0 18px;cursor:pointer;box-shadow:0 12px 30px rgba(15,23,42,.22)}
body.template-builder-ready{min-width:0;overflow-x:auto}
.builder-workspace{width:min(1340px,calc(100% - 32px));margin:22px auto;display:grid;grid-template-columns:minmax(0,1fr) 390px;gap:24px;align-items:start}
.builder-preview{min-width:0;overflow:auto;display:flex;justify-content:flex-start;align-items:flex-start;padding-bottom:24px}
.builder-preview>.resume{flex:0 0 auto;margin:0!important}
.builder-panel{position:sticky;top:18px;max-height:calc(100vh - 36px);overflow-y:auto;background:#fff;border:1px solid #d9e1ea;border-radius:8px;box-shadow:0 18px 45px rgba(15,23,42,.13);color:#172033;font-family:Inter,"Segoe UI",Arial,sans-serif}
.builder-panel *{box-sizing:border-box}
.builder-panel-header{position:sticky;top:0;z-index:2;background:#fff;border-bottom:1px solid #e4ebf2;padding:16px 18px}
.builder-panel-top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
.builder-back{color:#0a7c61;font-size:13px;font-weight:700;text-decoration:none}
.builder-lang{width:88px;height:34px;border:1px solid #cbd6e2;border-radius:6px;background:#f8fafc;color:#172033;font:inherit;font-size:13px;font-weight:700;padding:0 8px}
.builder-panel h2{display:block;margin:0;padding:0;border:0;color:#172033;font-size:22px;font-weight:800;line-height:1.15}
.builder-section{padding:18px;border-bottom:1px solid #edf1f5}
.builder-section-title{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
.builder-section h3{display:block;margin:0;color:#172033;font-size:14px;font-weight:800;line-height:1.2}
.builder-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.builder-field{display:grid;gap:6px}.builder-field.builder-wide{grid-column:1/-1}
.builder-field span{color:#5b6778;font-size:12px;font-weight:700}
.builder-field input,.builder-field textarea,.builder-field select{width:100%;border:1px solid #cfd9e5;border-radius:6px;background:#fbfdff;color:#172033;font:inherit;font-size:14px;line-height:1.35;padding:10px 11px;outline:none}
.builder-field textarea{min-height:86px;resize:vertical}
.builder-entry{display:grid;gap:12px;padding:14px;border:1px solid #e2e8f0;border-radius:8px;background:#f8fafc;margin-bottom:12px}
.builder-entry-actions{display:flex;justify-content:flex-end}
.builder-button{height:34px;border:1px solid #0a7c61;border-radius:6px;background:#0a7c61;color:#fff;cursor:pointer;font:inherit;font-size:13px;font-weight:800;padding:0 13px}
.builder-button.builder-secondary{border-color:#cbd6e2;background:#fff;color:#425069}
.builder-button:disabled{cursor:not-allowed;opacity:.45}

@media(max-width:1240px){.builder-workspace{grid-template-columns:minmax(0,1fr)}.builder-panel{position:static;max-height:none;order:-1}}
@media(max-width:900px){.resume{width:100%;height:auto;min-height:100vh;margin:0;padding:24px}.header{grid-template-columns:1fr}.photo{margin-bottom:18px}.contact{grid-template-columns:1fr}.contact .wide{grid-column:auto}.skills-grid{grid-template-columns:1fr}}
@media(max-width:700px){.builder-workspace{width:min(100% - 20px,100%);margin:10px auto}.builder-grid{grid-template-columns:1fr}}
@media print{
@page{size:A4;margin:0}
html,body{width:210mm;height:297mm;margin:0!important;padding:0!important;background:#fff!important;overflow:hidden!important}
.download-pdf-btn,.builder-panel{display:none!important}
.builder-workspace,.builder-preview{display:block!important;width:210mm!important;height:297mm!important;margin:0!important;padding:0!important;overflow:hidden!important}
.resume{width:210mm!important;height:297mm!important;margin:0!important;padding:8mm 9mm 7mm!important;overflow:hidden!important}
.header{display:grid!important;grid-template-columns:31mm 1fr!important;column-gap:6mm!important;margin-bottom:8mm!important}
.photo{width:31mm!important;height:31mm!important}
h1{font-size:9.2mm!important;margin-top:1mm!important}
.subtitle{font-size:4mm!important;margin-top:2mm!important;margin-bottom:4.5mm!important}
.contact{grid-template-columns:36mm 36mm 1fr!important;font-size:2.65mm!important;row-gap:1.5mm!important;column-gap:2.5mm!important}
.bar-title{font-size:4.7mm!important;padding:2.3mm 3mm!important;margin:4.5mm 0 3mm!important}
p{font-size:2.85mm!important;line-height:1.35!important}
.job{margin-bottom:4.6mm!important}.job-head{gap:5mm!important;margin-bottom:2mm!important}
h3{font-size:3.4mm!important}.company,.school{font-size:3.2mm!important}.place,.date{font-size:2.75mm!important}
li{font-size:2.75mm!important;line-height:1.28!important;margin-bottom:.7mm!important}
.education{gap:4mm!important}.edu-meta{font-size:2.75mm!important;margin-top:1.7mm!important}
.skills-grid{grid-template-columns:repeat(3,1fr)!important;gap:4mm 7mm!important}
.skill{grid-template-columns:22mm 1fr!important;column-gap:3mm!important}
.skill-name{font-size:2.75mm!important}.dot{width:3mm!important;height:3mm!important}.dots{gap:1.1mm!important}.level{font-size:2.55mm!important}
}
</style>
</head>

:"Data Bases",dots:4,level:"Advanced"},{name:"Machine Learning",dots:3,level:"Proficient"},{name:"Machine Learning",dots:3,level:"Proficient"},{name:"Machine Learning",dots:3,level:"Proficient"}]}},

};
let language=localStorage.getItem("cv-maker-language")||"en";if(!DEFAULTS[language])language="en";
let state=clone(DEFAULTS[language]),panel;
document.addEventListener("DOMContentLoaded",init);

function init(){
const resume=document.querySelector(".resume"),workspace=document.createElement("main"),preview=document.createElement("div");
workspace.className="builder-workspace";preview.className="builder-preview";panel=document.createElement("aside");panel.className="builder-panel";
resume.parentNode.insertBefore(workspace,resume);preview.appendChild(resume);workspace.appendChild(preview);workspace.appendChild(panel);
document.body.classList.add("template-builder-ready");renderPanel();renderResume();bindEvents();
}
function t(k){return TEXT[language]?.[k]||TEXT.en[k]||k}
function bindEvents(){
panel.addEventListener("input",e=>{
const input=e.target;
if(input.matches("[data-field]")){state.fields[input.dataset.field]=input.value;renderResume()}
if(input.matches("[data-collection]")){const item=state.collections[input.dataset.collection][Number(input.dataset.index)];if(item){item[input.dataset.key]=input.value;renderResume()}}
});
panel.addEventListener("change",e=>{
const input=e.target;
if(input.matches("[data-photo-upload]")){
const file=input.files&&input.files[0];if(!file)return;
const reader=new FileReader();
reader.onload=()=>{state.fields.photoData=reader.result;renderResume()};
reader.readAsDataURL(file);return;
}
if(input.matches("[data-builder-language]")){
language=input.value;localStorage.setItem("cv-maker-language",language);state=clone(DEFAULTS[language]);renderPanel();renderResume();
}
});
panel.addEventListener("click",e=>{
const add=e.target.closest("[data-add]"),remove=e.target.closest("[data-remove]"),back=e.target.closest("[data-builder-back]");
if(back){e.preventDefault();if(window.history.length>1)window.history.back();return}
if(add){state.collections[add.dataset.add].push(blank(add.dataset.add));renderPanel();renderResume()}
if(remove){const arr=state.collections[remove.dataset.remove];if(arr.length>1){arr.splice(Number(remove.dataset.index),1);renderPanel();renderResume()}}
});
}
function blank(type){if(type==="experience")return{role:"",company:"",date:"",place:"",details:""};if(type==="education")return{degree:"",school:"",date:"",place:""};if(type==="skills")return{name:"",dots:3,level:""}}
function renderPanel(){
panel.innerHTML=`<header class="builder-panel-header"><div class="builder-panel-top"><a class="builder-back" href="/" data-builder-back>${t("back")}</a><select class="builder-lang" data-builder-language><option value="en"${language==="en"?" selected":""}>EN</option><option value="uz"${language==="uz"?" selected":""}>UZ</option><option value="ru"${language==="ru"?" selected":""}>RU</option></select></div><h2>${t("builder")}</h2></header>
<section class="builder-section"><div class="builder-section-title"><h3>${t("personal")}</h3></div><div class="builder-grid">${field(t("fullName"),"fullName",state.fields.fullName)}${field(t("jobTitle"),"jobTitle",state.fields.jobTitle)}${field(t("phone"),"phone",state.fields.phone)}${field(t("email"),"email",state.fields.email)}${field(t("location"),"location",state.fields.location,true)}${field(t("linkedin"),"linkedin",state.fields.linkedin,true)}${field(t("github"),"github",state.fields.github,true)}<label class="builder-field builder-wide"><span>${t("photoUpload")}</span><input type="file" accept="image/*" data-photo-upload></label></div></section>
<section class="builder-section"><div class="builder-section-title"><h3>${t("summary")}</h3></div>${field(t("summary"),"summary",state.fields.summary,true,"textarea")}</section>
${section("experience",t("experience"),expEntry)}${section("education",t("education"),eduEntry)}${section("skills",t("skills"),skillEntry)}`;
}
function field(label,key,value,wide,type){const c=type==="textarea"?`<textarea data-field="${key}">${esc(value)}</textarea>`:`<input data-field="${key}" value="${attr(value)}">`;return`<label class="builder-field${wide?" builder-wide":""}"><span>${label}</span>${c}</label>`}
function section(type,title,renderer){return`<section class="builder-section"><div class="builder-section-title"><h3>${title}</h3><button class="builder-button" type="button" data-add="${type}">${t("add")}</button></div>${state.collections[type].map((e,i)=>renderer(type,e,i)).join("")}</section>`}
function expEntry(type,e,i){return`<div class="builder-entry"><div class="builder-grid">${cf(t("role"),type,i,"role",e.role)}${cf(t("company"),type,i,"company",e.company)}${cf(t("date"),type,i,"date",e.date)}${cf(t("place"),type,i,"place",e.place)}${cf(t("details"),type,i,"details",e.details,true,"textarea")}</div>${removeBtn(type,i)}</div>`}
function eduEntry(type,e,i){return`<div class="builder-entry"><div class="builder-grid">${cf(t("degree"),type,i,"degree",e.degree)}${cf(t("school"),type,i,"school",e.school)}${cf(t("date"),type,i,"date",e.date)}${cf(t("place"),type,i,"place",e.place)}</div>${removeBtn(type,i)}</div>`}
function skillEntry(type,e,i){return`<div class="builder-entry"><div class="builder-grid">${cf(t("skill"),type,i,"name",e.name)}${cf(t("level"),type,i,"level",e.level)}${cf(t("dots"),type,i,"dots",e.dots,true)}</div>${removeBtn(type,i)}</div>`}
function cf(label,type,i,key,value,wide,kind){const attrs=`data-collection="${type}" data-index="${i}" data-key="${key}"`;const c=kind==="textarea"?`<textarea ${attrs}>${esc(value)}</textarea>`:`<input ${attrs} value="${attr(value)}">`;return`<label class="builder-field${wide?" builder-wide":""}"><span>${label}</span>${c}</label>`}
function removeBtn(type,i){return`<div class="builder-entry-actions"><button class="builder-button builder-secondary" type="button" data-remove="${type}" data-index="${i}"${state.collections[type].length<=1?" disabled":""}>${t("remove")}</button></div>`}
function renderResume(){
document.querySelector(".download-pdf-btn").textContent=t("downloadPDF");
document.querySelector(".photo").src=state.fields.photoData||"{% static 'images/default-profile.png' %}";
document.querySelector("h1").textContent=state.fields.fullName;
document.querySelector(".subtitle").textContent=state.fields.jobTitle;
document.querySelector(".contact").innerHTML=`<span>📞 ${esc(state.fields.phone)}</span><span>✉️ ${esc(state.fields.email)}</span><span>📍 ${esc(state.fields.location)}</span><span class="wide">🔗 ${esc(state.fields.linkedin)}</span><span>⚙️ ${esc(state.fields.github)}</span>`;
document.querySelector(".summary .bar-title").textContent=t("summary");
document.querySelector(".summary p").textContent=state.fields.summary;
renderExperience();renderEducation();renderSkills();
}
function renderExperience(){
const box=document.querySelector(".experience");box.innerHTML=`<div class="bar-title">${t("experience")}</div>`;
state.collections.experience.filter(hasValue).forEach(e=>{
const div=document.createElement("div");div.className="job";
div.innerHTML=`<div class="job-head"><div><h3>${esc(e.role)}</h3><div class="company">${esc(e.company)}</div><div class="place">${esc(e.place)}</div></div><div class="date">${esc(e.date)}<br>${esc(e.place)}</div></div><ul>${lines(e.details).map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`;
box.appendChild(div);
});
}
function renderEducation(){
document.querySelector(".education-section .bar-title").textContent=t("education");
const box=document.querySelector(".education");box.innerHTML="";
state.collections.education.filter(hasValue).forEach(e=>{
const div=document.createElement("div");
div.innerHTML=`<h3>${esc(e.degree)}</h3><div class="school">${esc(e.school)}</div><div class="edu-meta"><span>${esc(e.date)}</span><span>${esc(e.place)}</span></div>`;
box.appendChild(div);
});
}
function renderSkills(){
document.querySelector(".skills .bar-title").textContent=t("skills");
const box=document.querySelector(".skills-grid");box.innerHTML="";
state.collections.skills.filter(hasValue).forEach(s=>{

function hasValue(o){return Object.values(o).some(v=>String(v||"").trim())}
function lines(v){return String(v||"").split("\n").map(x=>x.trim()).filter(Boolean)}
function clone(v){return JSON.parse(JSON.stringify(v))}
function esc(v){return String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function attr(v){return esc(v).replace(/"/g,"&quot;")}
