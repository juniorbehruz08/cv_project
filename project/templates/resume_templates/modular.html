{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Taylor Parker Resume - Modular Builder</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#d9d9d9;font-family:"Segoe UI",Arial,sans-serif;color:#22253a}
.resume{width:850px;height:1130px;margin:22px auto;background:#fff;display:grid;grid-template-columns:532px 1fr;column-gap:52px;padding:40px 36px 34px;overflow:hidden}
h1{font-size:29px;line-height:1;font-weight:800;color:#22243a;letter-spacing:-.2px;margin-bottom:8px}
.role{font-size:14px;color:#2d87bd;margin-bottom:29px}
section{margin-bottom:28px}
h2{font-size:20px;line-height:1;font-weight:800;color:#25273c;display:flex;align-items:center;gap:12px;margin-bottom:16px}
h2:after{content:"";flex:1;height:1px;background:#d9d9d9;transform:translateY(2px)}
p{font-size:12.1px;line-height:1.45;color:#555b66}
.job{margin-bottom:24px}
.job-head{display:grid;grid-template-columns:1fr 150px;gap:16px;margin-bottom:8px}
h3{font-size:14.4px;line-height:1.2;font-weight:800;color:#22243a;margin-bottom:4px}
.company,.school{color:#2d87bd;font-size:13.5px;line-height:1.15;margin-bottom:4px}
.date{text-align:right;color:#5c626b;font-size:11.7px;line-height:1.45}
ul{padding-left:17px}
li{font-size:11.7px;line-height:1.42;color:#555b66;margin-bottom:4px}
.edu-item{margin-bottom:20px}
.field{font-size:11.8px;color:#777b83;margin-bottom:5px}
.edu-meta{display:flex;gap:30px;font-size:11.8px;color:#5c626b;margin-top:4px}
.right{padding-top:0}
.photo{width:132px;height:132px;object-fit:cover;border-radius:8px;background:#ccc;display:block;margin:0 auto 31px;box-shadow:0 1px 4px rgba(0,0,0,.18)}
.contact-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:11px;color:#5c626b;font-size:11.8px;line-height:1.25}
.icon{width:13px;color:#9b9da7;flex:0 0 13px}
.skill-pills{display:flex;flex-direction:column;gap:15px;padding-top:1px}
.pill{width:max-content;min-width:154px;height:25px;border-radius:15px;background:#f0f9fc;color:#2d87bd;display:flex;align-items:center;padding:0 13px;font-size:12px}
.lang-row{display:grid;grid-template-columns:1fr auto;align-items:start;margin-bottom:19px;font-size:11.8px;color:#5c626b}
.dots{display:flex;gap:5px;justify-content:flex-end}
.dot{width:12px;height:12px;border-radius:50%;background:#d8e4e9}
.dot.on{background:#0878b9}
.level{font-size:11px;text-align:right;color:#5c626b;margin-top:2px}
.right li{font-size:11.6px}

.download-pdf-btn{position:fixed;right:24px;bottom:24px;z-index:9999;height:44px;border:0;border-radius:999px;background:#0878b9;color:#fff;font:inherit;font-size:14px;font-weight:800;padding:0 18px;cursor:pointer;box-shadow:0 12px 30px rgba(15,23,42,.22)}
body.template-builder-ready{min-width:0;overflow-x:auto}
.builder-workspace{width:min(1340px,calc(100% - 32px));margin:22px auto;display:grid;grid-template-columns:minmax(0,1fr) 390px;gap:24px;align-items:start}
.builder-preview{min-width:0;overflow:auto;display:flex;justify-content:flex-start;align-items:flex-start;padding-bottom:24px}
.builder-preview>.resume{flex:0 0 auto;margin:0!important}
.builder-panel{position:sticky;top:18px;max-height:calc(100vh - 36px);overflow-y:auto;background:#fff;border:1px solid #d9e1ea;border-radius:8px;box-shadow:0 18px 45px rgba(15,23,42,.13);color:#172033;font-family:Inter,"Segoe UI",Arial,sans-serif}
.builder-panel *{box-sizing:border-box}
.builder-panel-header{position:sticky;top:0;z-index:2;background:#fff;border-bottom:1px solid #e4ebf2;padding:16px 18px}
.builder-panel-top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
.builder-back{color:#0878b9;font-size:13px;font-weight:700;text-decoration:none}
.builder-lang{width:88px;height:34px;border:1px solid #cbd6e2;border-radius:6px;background:#f8fafc;color:#172033;font:inherit;font-size:13px;font-weight:700;padding:0 8px}
.builder-panel h2{display:block;margin:0;padding:0;border:0;color:#172033;font-size:22px;font-weight:800;line-height:1.15}
.builder-panel h2:after,.builder-panel h3:after{content:none!important}
.builder-section{padding:18px;border-bottom:1px solid #edf1f5}
.builder-section-title{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
.builder-section h3{margin:0;color:#172033;font-size:14px;font-weight:800}
.builder-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.builder-field{display:grid;gap:6px}
.builder-field.builder-wide{grid-column:1/-1}
.builder-field span{color:#5b6778;font-size:12px;font-weight:700}
.builder-field input,.builder-field textarea{width:100%;border:1px solid #cfd9e5;border-radius:6px;background:#fbfdff;color:#172033;font:inherit;font-size:14px;line-height:1.35;padding:10px 11px;outline:none}
.builder-field textarea{min-height:86px;resize:vertical}
.builder-entry{display:grid;gap:12px;padding:14px;border:1px solid #e2e8f0;border-radius:8px;background:#f8fafc;margin-bottom:12px}
.builder-entry-actions{display:flex;justify-content:flex-end}
.builder-button{height:34px;border:1px solid #0878b9;border-radius:6px;background:#0878b9;color:#fff;cursor:pointer;font:inherit;font-size:13px;font-weight:800;padding:0 13px}
.builder-button.builder-secondary{border-color:#cbd6e2;background:#fff;color:#425069}
.builder-button:disabled{cursor:not-allowed;opacity:.45}

@media(max-width:1240px){.builder-workspace{grid-template-columns:minmax(0,1fr)}.builder-panel{position:static;max-height:none;order:-1}}
@media(max-width:900px){.resume{width:100%;height:auto;min-height:100vh;margin:0;grid-template-columns:1fr;padding:28px 24px}.builder-grid{grid-template-columns:1fr}.job-head{grid-template-columns:1fr}.date{text-align:left}}

@media print{
@page{size:A4;margin:0}
html,body{width:210mm;height:297mm;margin:0!important;padding:0!important;background:#fff!important;overflow:hidden!important}
.download-pdf-btn,.builder-panel{display:none!important}
.builder-workspace,.builder-preview{display:block!important;width:210mm!important;height:297mm!important;margin:0!important;padding:0!important;overflow:hidden!important}
.resume{width:210mm!important;height:297mm!important;margin:0!important;display:grid!important;grid-template-columns:132mm 1fr!important;column-gap:12mm!important;padding:8mm 9mm 7mm!important;overflow:hidden!important}
h1{font-size:7.4mm!important}
.role{font-size:3.3mm!important;margin-bottom:7mm!important}
section{margin-bottom:6mm!important}
h2{font-size:4.6mm!important;margin-bottom:3.5mm!important}
p{font-size:2.65mm!important;line-height:1.33!important}
.job{margin-bottom:5mm!important}
.job-head{grid-template-columns:1fr 36mm!important;gap:4mm!important}
h3{font-size:3.25mm!important}
.company,.school{font-size:3mm!important}
.date,.edu-meta,.field{font-size:2.62mm!important}
li{font-size:2.58mm!important;line-height:1.27!important}
.photo{width:31mm!important;height:31mm!important;margin-bottom:7mm!important}
.contact-item{font-size:2.65mm!important;margin-bottom:2.7mm!important}
.pill{height:5.8mm!important;min-width:36mm!important;font-size:2.6mm!important}
.skill-pills{gap:3.5mm!important}
.lang-row{font-size:2.65mm!important;margin-bottom:4.2mm!important}
.dot{width:2.7mm!important;height:2.7mm!important}
.level{font-size:2.45mm!important}
}
</style>
</head>

<script>

],

],

],

certifications:[{value:"Certified Scrum Master by Atlassian\nIssued Jun 2017"},{value:"Certified React Native Developer\nIssued May 2019"},{value:"Certified Apple Developer\nIssued Apr 2021"}]
}},

fields:{fullName:"Taylor Parker",jobTitle:"Katta dasturiy ta'minot muhandisi | Product Team Lead",phone:"321-554-8877",email:"321-554-8877",location:"Philadelphia, Pennsylvania",linkedin:"https://linkedin.com/in/taylorparker",github:"https://github.com/tlrpkr_hack",photoData:"",summary:"10+ yillik tajribaga ega dasturiy ta'minot muhandisi. Veb ilovalar va backend tizimlarini ishlab chiqishda tajribaga ega. Toza va tushunarli yechimlar yaratadi."},
collections:{experience:[{role:"Katta dasturiy ta'minot muhandisi",company:"Google",date:"Yan 2020 - Hozir",place:"London, Birlashgan Qirollik",details:"Brend va strategiyaga mos dizayn materiallarini ishlab chiqdi.\nBir nechta loyihalarni bir vaqtda boshqarib, muddatlarga rioya qildi."}],education:[{degree:"Kompyuter fanlari magistri",school:"Stanford Universiteti",field:"Yo'nalish - Kompyuter fanlari",date:"2016 - 2018",place:"Stanford, CA"}],achievements:[{value:"12 million dollarlik dasturiy loyiha jarayonini boshqargan"}],skills:[{value:"Backend dasturlash"},{value:"Frontend dasturlash"},{value:"Ma'lumotlar bazalari"}],languages:[{name:"Ingliz tili",dots:5,level:"Native"}],certifications:[{value:"Atlassian tomonidan Certified Scrum Master\nBerilgan: Iyun 2017"}]}},

collections:{experience:[{role:"Старший инженер ПО",company:"Google",date:"Янв 2020 - Настоящее время",place:"London, United Kingdom",details:"Разрабатывал материалы, соответствующие бренду и стратегии.\nУправлял несколькими проектами одновременно."}],education:[{degree:"Магистр компьютерных наук",school:"Стэнфордский университет",field:"Специализация - Computer Science",date:"2016 - 2018",place:"Stanford, CA"}],achievements:[{value:"Руководил программным проектом стоимостью $12M от дизайна до запуска"}],skills:[{value:"Backend-разработка"},{value:"Frontend-разработка"},{value:"Базы данных"}],languages:[{name:"Английский",dots:5,level:"Носитель"}],certifications:[{value:"Certified Scrum Master от Atlassian\nВыдано: июнь 2017"}]}}
};

let language=localStorage.getItem("cv-maker-language")||"en";
if(!DEFAULTS[language])language="en";
let state=clone(DEFAULTS[language]),panel;
document.addEventListener("DOMContentLoaded",init);

function init(){
const resume=document.querySelector(".resume"),workspace=document.createElement("main"),preview=document.createElement("div");
workspace.className="builder-workspace";preview.className="builder-preview";panel=document.createElement("aside");panel.className="builder-panel";
resume.parentNode.insertBefore(workspace,resume);preview.appendChild(resume);workspace.appendChild(preview);workspace.appendChild(panel);
document.body.classList.add("template-builder-ready");
renderPanel();renderResume();bindEvents();
}

function t(k){return TEXT[language]?.[k]||TEXT.en[k]||k}

function bindEvents(){
panel.addEventListener("input",e=>{
const input=e.target;
if(input.matches("[data-field]")){state.fields[input.dataset.field]=input.value;renderResume()}
if(input.matches("[data-collection]")){
const item=state.collections[input.dataset.collection][Number(input.dataset.index)];
if(item){item[input.dataset.key]=input.value;renderResume()}
}
});

panel.addEventListener("change",e=>{
const input=e.target;
if(input.matches("[data-photo-upload]")){
const file=input.files&&input.files[0];if(!file)return;
const reader=new FileReader();
reader.onload=()=>{state.fields.photoData=reader.result;renderResume()};
reader.readAsDataURL(file);return;
}
if(input.matches("[data-builder-language]")){
language=input.value;localStorage.setItem("cv-maker-language",language);
state=clone(DEFAULTS[language]);renderPanel();renderResume();
}
});

panel.addEventListener("click",e=>{
const add=e.target.closest("[data-add]"),remove=e.target.closest("[data-remove]"),back=e.target.closest("[data-builder-back]");
if(back){e.preventDefault();if(window.history.length>1)window.history.back();return}
if(add){state.collections[add.dataset.add].push(blank(add.dataset.add));renderPanel();renderResume()}
if(remove){const arr=state.collections[remove.dataset.remove];if(arr.length>1){arr.splice(Number(remove.dataset.index),1);renderPanel();renderResume()}}
});
}

function blank(type){
if(type==="experience")return{role:"",company:"",date:"",place:"",details:""};
if(type==="education")return{degree:"",school:"",field:"",date:"",place:""};
if(type==="languages")return{name:"",dots:3,level:""};
return{value:""};
}

function renderPanel(){
panel.innerHTML=`
<header class="builder-panel-header">
<div class="builder-panel-top">
<a class="builder-back" href="/" data-builder-back>${t("back")}</a>
<select class="builder-lang" data-builder-language>
<option value="en"${language==="en"?" selected":""}>EN</option>
<option value="uz"${language==="uz"?" selected":""}>UZ</option>
<option value="ru"${language==="ru"?" selected":""}>RU</option>
</select>
</div>
<h2>${t("builder")}</h2>
</header>

<section class="builder-section">
<div class="builder-section-title"><h3>${t("personal")}</h3></div>
<div class="builder-grid">
${field(t("fullName"),"fullName",state.fields.fullName)}
${field(t("jobTitle"),"jobTitle",state.fields.jobTitle)}
${field(t("phone"),"phone",state.fields.phone)}
${field(t("email"),"email",state.fields.email)}
${field(t("location"),"location",state.fields.location,true)}
${field(t("linkedin"),"linkedin",state.fields.linkedin,true)}
${field(t("github"),"github",state.fields.github,true)}
<label class="builder-field builder-wide"><span>${t("photoUpload")}</span><input type="file" accept="image/*" data-photo-upload></label>
</div>
</section>

<section class="builder-section"><div class="builder-section-title"><h3>${t("summary")}</h3></div>${field(t("summary"),"summary",state.fields.summary,true,"textarea")}</section>
${section("experience",t("experience"),expEntry)}
${section("education",t("education"),eduEntry)}
${section("achievements",t("achievements"),simpleEntry,t("achievement"))}
${section("skills",t("skills"),simpleEntry,t("skill"))}
${section("languages",t("languages"),languageEntry)}
${section("certifications",t("certifications"),simpleEntry,t("certification"))}
`;
}

function field(label,key,value,wide,type){
const c=type==="textarea"?`<textarea data-field="${key}">${esc(value)}</textarea>`:`<input data-field="${key}" value="${attr(value)}">`;
return`<label class="builder-field${wide?" builder-wide":""}"><span>${label}</span>${c}</label>`;
}

function section(type,title,renderer,label){
return`<section class="builder-section"><div class="builder-section-title"><h3>${title}</h3><button class="builder-button" type="button" data-add="${type}">${t("add")}</button></div>${state.collections[type].map((e,i)=>renderer(type,e,i,label)).join("")}</section>`;
}

function expEntry(type,e,i){
return`<div class="builder-entry"><div class="builder-grid">${cf(t("role"),type,i,"role",e.role)}${cf(t("company"),type,i,"company",e.company)}${cf(t("date"),type,i,"date",e.date)}${cf(t("place"),type,i,"place",e.place)}${cf(t("details"),type,i,"details",e.details,true,"textarea")}</div>${removeBtn(type,i)}</div>`;
}

function eduEntry(type,e,i){
return`<div class="builder-entry"><div class="builder-grid">${cf(t("degree"),type,i,"degree",e.degree)}${cf(t("school"),type,i,"school",e.school)}${cf(t("field"),type,i,"field",e.field,true)}${cf(t("date"),type,i,"date",e.date)}${cf(t("place"),type,i,"place",e.place)}</div>${removeBtn(type,i)}</div>`;
}

function languageEntry(type,e,i){
return`<div class="builder-entry"><div class="builder-grid">${cf(t("language"),type,i,"name",e.name)}${cf(t("level"),type,i,"level",e.level)}${cf(t("dots"),type,i,"dots",e.dots,true)}</div>${removeBtn(type,i)}</div>`;
}

function simpleEntry(type,e,i,label){
return`<div class="builder-entry">${cf(label,type,i,"value",e.value,true,"textarea")}${removeBtn(type,i)}</div>`;
}

function cf(label,type,i,key,value,wide,kind){
const attrs=`data-collection="${type}" data-index="${i}" data-key="${key}"`;
const c=kind==="textarea"?`<textarea ${attrs}>${esc(value)}</textarea>`:`<input ${attrs} value="${attr(value)}">`;
return`<label class="builder-field${wide?" builder-wide":""}"><span>${label}</span>${c}</label>`;
}

function removeBtn(type,i){
return`<div class="builder-entry-actions"><button class="builder-button builder-secondary" type="button" data-remove="${type}" data-index="${i}"${state.collections[type].length<=1?" disabled":""}>${t("remove")}</button></div>`;
}

function renderResume(){
document.querySelector(".download-pdf-btn").textContent=t("downloadPDF");
document.querySelector(".photo").src=state.fields.photoData||"{% static 'images/default-profile.png' %}";
document.querySelector("h1").textContent=state.fields.fullName;
document.querySelector(".role").textContent=state.fields.jobTitle;
document.querySelector(".summary h2").textContent=t("summary");
document.querySelector(".summary p").textContent=state.fields.summary;
renderExperience();renderEducation();renderList(".achievements ul",state.collections.achievements,false);document.querySelector(".achievements h2").textContent=t("achievements");
renderContact();renderSkills();renderLanguages();renderList(".certifications ul",state.collections.certifications,true);document.querySelector(".certifications h2").textContent=t("certifications");
}

function renderContact(){
document.querySelector(".contact-section h2").textContent=t("contactInfo");
document.querySelector(".contact-list").innerHTML=`
<div class="contact-item"><span class="icon">📞</span><span>${esc(state.fields.phone)}</span></div>
<div class="contact-item"><span class="icon">✉</span><span>${esc(state.fields.email)}</span></div>
<div class="contact-item"><span class="icon">📍</span><span>${esc(state.fields.location)}</span></div>
<div class="contact-item"><span class="icon">in</span><span>${esc(state.fields.linkedin)}</span></div>
<div class="contact-item"><span class="icon">◔</span><span>${esc(state.fields.github)}</span></div>
`;
}

function renderExperience(){
const box=document.querySelector(".experience");box.innerHTML=`<h2>${t("experience")}</h2>`;
state.collections.experience.filter(hasValue).forEach(e=>{
const div=document.createElement("div");div.className="job";
div.innerHTML=`<div class="job-head"><div><h3>${esc(e.role)}</h3><div class="company">${esc(e.company)}</div></div><div class="date">${esc(e.date)}<br>${esc(e.place)}</div></div><ul>${lines(e.details).map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`;
box.appendChild(div);
});
}

function renderEducation(){
const box=document.querySelector(".education");box.innerHTML=`<h2>${t("education")}</h2>`;
state.collections.education.filter(hasValue).forEach(e=>{
const div=document.createElement("div");div.className="edu-item";
div.innerHTML=`<h3>${esc(e.degree)}</h3><div class="school">${esc(e.school)}</div><div class="field">${esc(e.field)}</div><div class="edu-meta"><span>${esc(e.date)}</span><span>${esc(e.place)}</span></div>`;
box.appendChild(div);
});
}

function renderSkills(){
document.querySelector(".skills-section h2").textContent=t("skills");
const box=document.querySelector(".skill-pills");box.innerHTML="";
state.collections.skills.filter(hasValue).forEach(s=>{const div=document.createElement("div");div.className="pill";div.textContent=s.value;box.appendChild(div)});
}

function renderLanguages(){
document.querySelector(".languages-section h2").textContent=t("languages");
const box=document.querySelector(".languages-list");box.innerHTML="";
state.collections.languages.filter(hasValue).forEach(l=>{
const dots=Math.max(0,Math.min(5,Number(l.dots)||0));
const div=document.createElement("div");div.className="lang-row";
div.innerHTML=`<span>${esc(l.name)}</span><div><div class="dots">${[1,2,3,4,5].map(n=>`<span class="dot${n<=dots?" on":""}"></span>`).join("")}</div><div class="level">${esc(l.level)}</div></div>`;
box.appendChild(div);
});
}

function renderList(selector,arr,multi){
const ul=document.querySelector(selector);ul.innerHTML="";
arr.filter(hasValue).forEach(e=>{
const li=document.createElement("li");
li.innerHTML=multi?esc(e.value).replace(/\n/g,"<br>"):esc(e.value);
ul.appendChild(li);
});
}

function hasValue(o){return Object.values(o).some(v=>String(v||"").trim())}
function lines(v){return String(v||"").split("\n").map(x=>x.trim()).filter(Boolean)}
function clone(v){return JSON.parse(JSON.stringify(v))}
function esc(v){return String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function attr(v){return esc(v).replace(/"/g,"&quot;")}
})();
</script>
</body>
