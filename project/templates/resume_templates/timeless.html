{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Taylor Parker Resume - Timeless Builder</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#d8d8d8;font-family:Georgia,"Times New Roman",serif;color:#202233}
.resume{width:850px;height:1130px;margin:22px auto;background:#fff;padding:36px 36px 34px;overflow:hidden}
header{margin-bottom:40px}
h1{font-size:39px;line-height:1;font-weight:700;letter-spacing:-.4px;color:#202233;margin-bottom:10px}
.role{font-size:18px;line-height:1.1;color:#202233;margin-bottom:23px}
.contact{display:flex;align-items:center;gap:25px;font-size:12.3px;color:#555968;white-space:nowrap}
section{margin-bottom:31px}
h2{font-size:21px;line-height:1;font-weight:700;color:#202233;display:flex;align-items:center;gap:12px;margin-bottom:17px}
h2:after{content:"";flex:1;height:1px;background:#d8d8d8;transform:translateY(2px)}
p{font-size:12.4px;line-height:1.45;color:#454955}
.job{margin-bottom:24px}
.job-head{display:grid;grid-template-columns:1fr 150px;gap:20px;margin-bottom:9px}
h3{font-size:15px;line-height:1.2;font-weight:700;color:#202233;margin-bottom:4px}
.company,.school{font-size:14px;line-height:1.15;color:#202233;margin-bottom:4px}
.place,.date{color:#4f5360;font-size:12.2px}
.date{text-align:right;line-height:1.45}
ul{padding-left:17px}
li{font-size:12.05px;line-height:1.4;color:#454955;margin-bottom:4px}
.edu-item{margin-bottom:21px}
.edu-meta{display:flex;gap:31px;color:#4f5360;font-size:12.2px;margin-top:8px}
.skills-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px 34px;margin-top:2px}
.skill-top{display:flex;justify-content:space-between;align-items:center;font-size:12.2px;color:#4f5360;margin-bottom:8px}
.segments{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.seg{height:4px;border-radius:20px;background:#e0e0e0}
.seg.on{background:#17142f}

.download-pdf-btn{position:fixed;right:24px;bottom:24px;z-index:9999;height:44px;border:0;border-radius:999px;background:#17142f;color:#fff;font:inherit;font-size:14px;font-weight:800;padding:0 18px;cursor:pointer;box-shadow:0 12px 30px rgba(15,23,42,.22)}
body.template-builder-ready{min-width:0;overflow-x:auto}
.builder-workspace{width:min(1340px,calc(100% - 32px));margin:22px auto;display:grid;grid-template-columns:minmax(0,1fr) 390px;gap:24px;align-items:start}
.builder-preview{min-width:0;overflow:auto;display:flex;justify-content:flex-start;align-items:flex-start;padding-bottom:24px}
.builder-preview>.resume{flex:0 0 auto;margin:0!important}
.builder-panel{position:sticky;top:18px;max-height:calc(100vh - 36px);overflow-y:auto;background:#fff;border:1px solid #d9e1ea;border-radius:8px;box-shadow:0 18px 45px rgba(15,23,42,.13);color:#172033;font-family:Inter,"Segoe UI",Arial,sans-serif}
.builder-panel *{box-sizing:border-box}
.builder-panel-header{position:sticky;top:0;z-index:2;background:#fff;border-bottom:1px solid #e4ebf2;padding:16px 18px}
.builder-panel-top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
.builder-back{color:#17142f;font-size:13px;font-weight:700;text-decoration:none}
.builder-lang{width:88px;height:34px;border:1px solid #cbd6e2;border-radius:6px;background:#f8fafc;color:#172033;font:inherit;font-size:13px;font-weight:700;padding:0 8px}
.builder-panel h2{display:block;margin:0;padding:0;border:0;color:#172033;font-size:22px;font-weight:800}
.builder-panel h2:after,.builder-panel h3:after{content:none!important}
.builder-section{padding:18px;border-bottom:1px solid #edf1f5}
.builder-section-title{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
.builder-section h3{margin:0;color:#172033;font-size:14px;font-weight:800}
.builder-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.builder-field{display:grid;gap:6px}
.builder-field.builder-wide{grid-column:1/-1}
.builder-field span{color:#5b6778;font-size:12px;font-weight:700}
.builder-field input,.builder-field textarea{width:100%;border:1px solid #cfd9e5;border-radius:6px;background:#fbfdff;color:#172033;font:inherit;font-size:14px;line-height:1.35;padding:10px 11px;outline:none}
.builder-field textarea{min-height:86px;resize:vertical}
.builder-entry{display:grid;gap:12px;padding:14px;border:1px solid #e2e8f0;border-radius:8px;background:#f8fafc;margin-bottom:12px}
.builder-entry-actions{display:flex;justify-content:flex-end}
.builder-button{height:34px;border:1px solid #17142f;border-radius:6px;background:#17142f;color:#fff;cursor:pointer;font:inherit;font-size:13px;font-weight:800;padding:0 13px}
.builder-button.builder-secondary{border-color:#cbd6e2;background:#fff;color:#425069}
.builder-button:disabled{cursor:not-allowed;opacity:.45}

@media(max-width:1240px){.builder-workspace{grid-template-columns:minmax(0,1fr)}.builder-panel{position:static;max-height:none;order:-1}}
@media(max-width:900px){.resume{width:100%;height:auto;min-height:100vh;margin:0;padding:28px 24px}.contact{flex-wrap:wrap}.builder-grid{grid-template-columns:1fr}.job-head{grid-template-columns:1fr}.date{text-align:left}.skills-grid{grid-template-columns:1fr}}

@media print{
@page{size:A4;margin:0}
*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
html,body{width:210mm;height:297mm;margin:0!important;padding:0!important;background:#fff!important;overflow:hidden!important}
.download-pdf-btn,.builder-panel{display:none!important}
.builder-workspace,.builder-preview{display:block!important;width:210mm!important;height:297mm!important;margin:0!important;padding:0!important;overflow:hidden!important}
.resume{width:210mm!important;height:297mm!important;margin:0!important;padding:9mm!important;overflow:hidden!important}
header{margin-bottom:9mm!important}
h1{font-size:9.2mm!important;margin-bottom:2.2mm!important}
.role{font-size:4.2mm!important;margin-bottom:5.5mm!important}
.contact{font-size:2.8mm!important;gap:6mm!important}
section{margin-bottom:7mm!important}
h2{font-size:4.9mm!important;margin-bottom:3.8mm!important}
p{font-size:2.9mm!important;line-height:1.33!important}
.job{margin-bottom:5.4mm!important}
.job-head{grid-template-columns:1fr 36mm!important;gap:5mm!important}
h3{font-size:3.5mm!important}
.company,.school{font-size:3.25mm!important}
.place,.date,.edu-meta{font-size:2.85mm!important}
li{font-size:2.75mm!important;line-height:1.28!important}
.skills-grid{grid-template-columns:repeat(3,1fr)!important;gap:4.2mm 8mm!important}
.skill-top{font-size:2.8mm!important;margin-bottom:1.8mm!important}
.seg{height:1mm!important}
}
</style>
</head>

<body>
<div class="resume">
<header>
<h1>Taylor Parker</h1>
<div class="role">Senior Software Engineer | Product Team Lead</div>
<div class="contact"></div>
</header>

<section class="summary"><h2>Summary</h2><p></p></section>
<section class="experience"><h2>Experience</h2></section>
<section class="education"><h2>Education</h2></section>
<section class="skills"><h2>Skills</h2><div class="skills-grid"></div></section>
</div>

<button class="download-pdf-btn{% if is_guest_demo %} guest-download-locked{% endif %}" type="button"
        onclick="{% if can_download %}downloadPDF(){% else %}window.location.href='{% url 'resume:login' %}?next={{ request.path|urlencode }}'{% endif %}">Download PDF</button>

<script>
function downloadPDF(){window.print()}

(function(){
const TEXT={
en:{back:"Back",builder:"CV Builder",personal:"Personal",fullName:"Full name",jobTitle:"Job title",phone:"Phone",email:"Email",location:"Location",linkedin:"LinkedIn",summary:"Summary",experience:"Experience",role:"Role",company:"Company",date:"Date",place:"Place",details:"Details",education:"Education",degree:"Degree",school:"School",skills:"Skills",skill:"Skill",level:"Level",segments:"Segments",add:"Add",remove:"Remove",downloadPDF:"Download PDF"},
uz:{back:"Orqaga",builder:"CV yaratish",personal:"Shaxsiy",fullName:"To'liq ism",jobTitle:"Kasb",phone:"Telefon",email:"Email",location:"Manzil",linkedin:"LinkedIn",summary:"Xulosa",experience:"Tajriba",role:"Lavozim",company:"Kompaniya",date:"Sana",place:"Joy",details:"Tafsilotlar",education:"Ta'lim",degree:"Daraja",school:"O'quv joyi",skills:"Ko'nikmalar",skill:"Ko'nikma",level:"Daraja",segments:"Segmentlar",add:"Qo'shish",remove:"O'chirish",downloadPDF:"PDF yuklab olish"},
ru:{back:"Назад",builder:"Конструктор CV",personal:"Личные данные",fullName:"ФИО",jobTitle:"Должность",phone:"Телефон",email:"Email",location:"Город",linkedin:"LinkedIn",summary:"О себе",experience:"Опыт",role:"Роль",company:"Компания",date:"Дата",place:"Место",details:"Детали",education:"Образование",degree:"Степень",school:"Учебное место",skills:"Навыки",skill:"Навык",level:"Уровень",segments:"Сегменты",add:"Добавить",remove:"Удалить",downloadPDF:"Скачать PDF"}
};

const DEFAULTS={
en:{
fields:{fullName:"Taylor Parker",jobTitle:"Senior Software Engineer | Product Team Lead",phone:"321-554-8877",email:"t.parker@gmail.com",location:"Mountain View, CA",linkedin:"https://linkedin.com/in/tparker",summary:"Passionate Software Engineer with 10+ years of experience in developing web applications and backend systems. Skilled at writing clear, concise code that is easy to maintain and troubleshoot. Experienced in working with both small and large teams across multiple projects and companies. Able to work independently of remote locations or in office environments as needed by the company."},
collections:{
experience:[{role:"Senior Software Engineer",company:"Google",date:"Jan 2020 - Present",place:"Mountain View, CA",details:"Developed design deliverables that elevated, differentiated, and functioned on-brand and on-strategy.\nManaged multiple design projects simultaneously, ensuring timely delivery within budget constraints.\nCreated compelling visual presentations to effectively communicate complex ideas to clients and stakeholders.\nDeveloped and maintained comprehensive library of design assets for easy access and reuse."},{role:"Product Team Lead",company:"Dropbox",date:"Nov 2018 - Dec 2019",place:"Mountain View, CA",details:"Developed design deliverables that elevated, differentiated, and functioned on-brand and on-strategy.\nManaged multiple design projects simultaneously, ensuring timely delivery within budget constraints.\nCreated compelling visual presentations to effectively communicate complex ideas to clients and stakeholders."}],
education:[{degree:"Master of Science in Computer Science",school:"Stanford University",date:"2016 - 2018",place:"Stanford, CA"},{degree:"Bachelor of Science in Computer Science",school:"Carnegie Mellon University",date:"2013 - 2016",place:"Pittsburgh, PA"}],
skills:[{name:"Back-end",level:"Expert",segments:5},{name:"Front-end",level:"Advanced",segments:4},{name:"Data Bases",level:"Advanced",segments:4},{name:"Machine Learning",level:"Proficient",segments:3},{name:"AI",level:"Proficient",segments:3},{name:"Networks",level:"Proficient",segments:3}]
}},
uz:{
fields:{fullName:"Taylor Parker",jobTitle:"Katta dasturiy ta'minot muhandisi | Product Team Lead",phone:"321-554-8877",email:"t.parker@gmail.com",location:"Mountain View, CA",linkedin:"https://linkedin.com/in/tparker",summary:"10+ yillik tajribaga ega mutaxassis. Veb ilovalar va backend tizimlarini ishlab chiqishda tajribaga ega. Toza va tushunarli yechimlar yaratadi."},
collections:{experience:[{role:"Katta dasturiy ta'minot muhandisi",company:"Google",date:"Yan 2020 - Hozir",place:"Mountain View, CA",details:"Brend va strategiyaga mos dizayn materiallarini ishlab chiqdi.\nBir nechta loyihalarni bir vaqtda boshqarib, muddatlarga rioya qildi."}],education:[{degree:"Kompyuter fanlari magistri",school:"Stanford Universiteti",date:"2016 - 2018",place:"Stanford, CA"}],skills:[{name:"Backend",level:"Ekspert",segments:5},{name:"Frontend",level:"Yuqori",segments:4},{name:"AI",level:"Yaxshi",segments:3}]}},
ru:{
fields:{fullName:"Taylor Parker",jobTitle:"Старший инженер ПО | Руководитель продуктовой команды",phone:"321-554-8877",email:"t.parker@gmail.com",location:"Mountain View, CA",linkedin:"https://linkedin.com/in/tparker",summary:"Специалист с опытом более 10 лет в разработке веб-приложений и backend-систем. Создает понятные и поддерживаемые решения."},
collections:{experience:[{role:"Старший инженер ПО",company:"Google",date:"Янв 2020 - Настоящее время",place:"Mountain View, CA",details:"Разрабатывал материалы, соответствующие бренду и стратегии.\nУправлял несколькими проектами одновременно."}],education:[{degree:"Магистр компьютерных наук",school:"Стэнфордский университет",date:"2016 - 2018",place:"Stanford, CA"}],skills:[{name:"Backend",level:"Эксперт",segments:5},{name:"Frontend",level:"Продвинутый",segments:4},{name:"AI",level:"Уверенный",segments:3}]}}
};

let language=localStorage.getItem("cv-maker-language")||"uz";
if(!DEFAULTS[language])language="uz";
let state=clone(DEFAULTS[language]),panel;

// Restore what the visitor already typed (survives login/register redirects)
const STATE_KEY="cv-builder-state-timeless";
try{
const saved=JSON.parse(localStorage.getItem(STATE_KEY));
if(saved&&saved.state){
if(saved.state.fields)Object.assign(state.fields,saved.state.fields);
if(saved.state.collections)Object.keys(state.collections).forEach(k=>{if(Array.isArray(saved.state.collections[k]))state.collections[k]=saved.state.collections[k]});
}
}catch(e){}

function persistState(){
try{localStorage.setItem(STATE_KEY,JSON.stringify({language:language,state:state}))}catch(e){}
}
document.addEventListener("DOMContentLoaded",init);

function init(){
const resume=document.querySelector(".resume"),workspace=document.createElement("main"),preview=document.createElement("div");
workspace.className="builder-workspace";preview.className="builder-preview";panel=document.createElement("aside");panel.className="builder-panel";
resume.parentNode.insertBefore(workspace,resume);preview.appendChild(resume);workspace.appendChild(preview);workspace.appendChild(panel);
document.body.classList.add("template-builder-ready");
renderPanel();renderResume();bindEvents();
}

function t(k){return TEXT[language]?.[k]||TEXT.en[k]||k}

function bindEvents(){
panel.addEventListener("input",e=>{
const input=e.target;
if(input.matches("[data-field]")){state.fields[input.dataset.field]=input.value;renderResume()}
if(input.matches("[data-collection]")){
const item=state.collections[input.dataset.collection][Number(input.dataset.index)];
if(item){item[input.dataset.key]=input.value;renderResume()}
}
});
panel.addEventListener("change",e=>{
const input=e.target;
if(input.matches("[data-builder-language]")){
language=input.value;localStorage.setItem("cv-maker-language",language);
state=clone(DEFAULTS[language]);renderPanel();renderResume();
}
});
panel.addEventListener("click",e=>{
const add=e.target.closest("[data-add]"),remove=e.target.closest("[data-remove]"),back=e.target.closest("[data-builder-back]");
if(back){e.preventDefault();if(window.history.length>1)window.history.back();return}
if(add){state.collections[add.dataset.add].push(blank(add.dataset.add));renderPanel();renderResume()}
if(remove){const arr=state.collections[remove.dataset.remove];if(arr.length>1){arr.splice(Number(remove.dataset.index),1);renderPanel();renderResume()}}
});
}

function blank(type){
if(type==="experience")return{role:"",company:"",date:"",place:"",details:""};
if(type==="education")return{degree:"",school:"",date:"",place:""};
if(type==="skills")return{name:"",level:"",segments:3};
}

function renderPanel(){
panel.innerHTML=`
<header class="builder-panel-header">
<div class="builder-panel-top">
<a class="builder-back" href="/" data-builder-back>${t("back")}</a>
<select class="builder-lang" data-builder-language>
<option value="en"${language==="en"?" selected":""}>EN</option>
<option value="uz"${language==="uz"?" selected":""}>UZ</option>
<option value="ru"${language==="ru"?" selected":""}>RU</option>
</select>
</div>
<h2>${t("builder")}</h2>
</header>

<section class="builder-section">
<div class="builder-section-title"><h3>${t("personal")}</h3></div>
<div class="builder-grid">
${field(t("fullName"),"fullName",state.fields.fullName)}
${field(t("jobTitle"),"jobTitle",state.fields.jobTitle)}
${field(t("phone"),"phone",state.fields.phone)}
${field(t("email"),"email",state.fields.email)}
${field(t("location"),"location",state.fields.location,true)}
${field(t("linkedin"),"linkedin",state.fields.linkedin,true)}
</div>
</section>

<section class="builder-section"><div class="builder-section-title"><h3>${t("summary")}</h3></div>${field(t("summary"),"summary",state.fields.summary,true,"textarea")}</section>
${section("experience",t("experience"),expEntry)}
${section("education",t("education"),eduEntry)}
${section("skills",t("skills"),skillEntry)}
`;
}

function field(label,key,value,wide,type){
const c=type==="textarea"?`<textarea data-field="${key}">${esc(value)}</textarea>`:`<input data-field="${key}" value="${attr(value)}">`;
return`<label class="builder-field${wide?" builder-wide":""}"><span>${label}</span>${c}</label>`;
}

function section(type,title,renderer){
return`<section class="builder-section"><div class="builder-section-title"><h3>${title}</h3><button class="builder-button" type="button" data-add="${type}">${t("add")}</button></div>${state.collections[type].map((e,i)=>renderer(type,e,i)).join("")}</section>`;
}

function expEntry(type,e,i){
return`<div class="builder-entry"><div class="builder-grid">${cf(t("role"),type,i,"role",e.role)}${cf(t("company"),type,i,"company",e.company)}${cf(t("date"),type,i,"date",e.date)}${cf(t("place"),type,i,"place",e.place)}${cf(t("details"),type,i,"details",e.details,true,"textarea")}</div>${removeBtn(type,i)}</div>`;
}

function eduEntry(type,e,i){
return`<div class="builder-entry"><div class="builder-grid">${cf(t("degree"),type,i,"degree",e.degree)}${cf(t("school"),type,i,"school",e.school)}${cf(t("date"),type,i,"date",e.date)}${cf(t("place"),type,i,"place",e.place)}</div>${removeBtn(type,i)}</div>`;
}

function skillEntry(type,e,i){
return`<div class="builder-entry"><div class="builder-grid">${cf(t("skill"),type,i,"name",e.name)}${cf(t("level"),type,i,"level",e.level)}${cf(t("segments"),type,i,"segments",e.segments,true)}</div>${removeBtn(type,i)}</div>`;
}

function cf(label,type,i,key,value,wide,kind){
const attrs=`data-collection="${type}" data-index="${i}" data-key="${key}"`;
const c=kind==="textarea"?`<textarea ${attrs}>${esc(value)}</textarea>`:`<input ${attrs} value="${attr(value)}">`;
return`<label class="builder-field${wide?" builder-wide":""}"><span>${label}</span>${c}</label>`;
}

function removeBtn(type,i){
return`<div class="builder-entry-actions"><button class="builder-button builder-secondary" type="button" data-remove="${type}" data-index="${i}"${state.collections[type].length<=1?" disabled":""}>${t("remove")}</button></div>`;
}

function renderResume(){
document.querySelector(".download-pdf-btn").textContent=t("downloadPDF");
document.querySelector("h1").textContent=state.fields.fullName;
document.querySelector(".role").textContent=state.fields.jobTitle;
document.querySelector(".contact").innerHTML=`<span>📞 ${esc(state.fields.phone)}</span><span>✉ ${esc(state.fields.email)}</span><span>📍 ${esc(state.fields.location)}</span><span>in ${esc(state.fields.linkedin)}</span>`;
document.querySelector(".summary h2").textContent=t("summary");
document.querySelector(".summary p").textContent=state.fields.summary;
renderExperience();renderEducation();renderSkills();
persistState();
}

function renderExperience(){
const box=document.querySelector(".experience");box.innerHTML=`<h2>${t("experience")}</h2>`;
state.collections.experience.filter(hasValue).forEach(e=>{
const div=document.createElement("div");div.className="job";
div.innerHTML=`<div class="job-head"><div><h3>${esc(e.role)}</h3><div class="company">${esc(e.company)}</div><div class="place">${esc(e.place)}</div></div><div class="date">${esc(e.date)}</div></div><ul>${lines(e.details).map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`;
box.appendChild(div);
});
}

function renderEducation(){
const box=document.querySelector(".education");box.innerHTML=`<h2>${t("education")}</h2>`;
state.collections.education.filter(hasValue).forEach(e=>{
const div=document.createElement("div");div.className="edu-item";
div.innerHTML=`<h3>${esc(e.degree)}</h3><div class="school">${esc(e.school)}</div><div class="edu-meta"><span>${esc(e.date)}</span><span>${esc(e.place)}</span></div>`;
box.appendChild(div);
});
}

function renderSkills(){
document.querySelector(".skills h2").textContent=t("skills");
const box=document.querySelector(".skills-grid");box.innerHTML="";
state.collections.skills.filter(hasValue).forEach(s=>{
const segments=Math.max(0,Math.min(5,Number(s.segments)||0));
const div=document.createElement("div");div.className="skill";
div.innerHTML=`<div class="skill-top"><span>${esc(s.name)}</span><span>${esc(s.level)}</span></div><div class="segments">${[1,2,3,4,5].map(n=>`<span class="seg${n<=segments?" on":""}"></span>`).join("")}</div>`;
box.appendChild(div);
});
}

function hasValue(o){return Object.values(o).some(v=>String(v||"").trim())}
function lines(v){return String(v||"").split("\n").map(x=>x.trim()).filter(Boolean)}
function clone(v){return JSON.parse(JSON.stringify(v))}
function esc(v){return String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function attr(v){return esc(v).replace(/"/g,"&quot;")}
})();
</script>
{% include 'resume_templates/_guest_demo_notice.html' %}
{% include 'resume_templates/_snapshot_recorder.html' %}
</body>
</html>
