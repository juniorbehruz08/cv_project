{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>John Bennett Resume Builder</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#d6d6d6;font-family:Georgia,"Times New Roman",serif;color:#242230}
.resume{width:850px;height:1133px;margin:22px auto;background:#fff;overflow:hidden}
.header{height:207px;background:#087882;color:#fff;position:relative;padding:36px 36px 0}
.header h1{font-size:39px;line-height:1;font-weight:700;letter-spacing:-.4px;margin-bottom:8px}
.role{font-size:18px;line-height:1.1;margin-bottom:23px}
.contact{display:grid;grid-template-columns:134px 134px 126px 1fr;gap:8px 12px;width:610px;font-size:12.5px;color:#e5f0f0;align-items:center}
.contact span{white-space:nowrap}
.contact .link{grid-column:auto/span 2}
.photo{position:absolute;right:36px;top:36px;width:133px;height:133px;object-fit:cover;border-radius:9px;background:#c8c8c8;box-shadow:0 1px 4px rgba(0,0,0,.25)}
.main{display:grid;grid-template-columns:285px 1fr;gap:34px;padding:22px 36px 30px}
section{margin-bottom:27px}
h2{font-size:20.5px;line-height:1;font-weight:700;color:#272533;display:flex;align-items:center;gap:12px;margin-bottom:17px}
h2:after{content:"";flex:1;height:1px;background:#d8d8d8;transform:translateY(1px)}
p{font-size:12.6px;line-height:1.48;color:#484958}
.summary p{width:235px}
.skill-pills{display:flex;flex-direction:column;gap:18px;padding-top:3px}
.pill{width:max-content;min-width:154px;height:25px;border-radius:16px;background:#eefafa;color:#087882;display:flex;align-items:center;padding:0 13px;font-size:13px}
.language{margin-bottom:25px}
.language-row{display:grid;grid-template-columns:1fr auto;align-items:start;margin-bottom:22px;font-size:13px;color:#555665}
.dots{display:flex;gap:5px;justify-content:flex-end}
.dot{width:12px;height:12px;border-radius:50%;background:#d6e2e2}
.dot.on{background:#087882}
.level{text-align:right;font-size:11.5px;color:#555665;margin-top:2px}
ul{padding-left:17px}
li{font-size:12.3px;line-height:1.45;color:#484958;margin-bottom:4px}
.job{margin-bottom:23px}
.job-head{display:grid;grid-template-columns:1fr 145px;gap:18px;margin-bottom:8px}
h3{font-size:15.5px;font-weight:700;line-height:1.2;color:#222332;margin-bottom:4px}
.company,.school{font-size:14px;line-height:1.15;color:#087882;margin-bottom:4px}
.place{font-size:12.4px;color:#555665}
.date{text-align:right;font-size:12.4px;color:#555665;line-height:1.4}
.edu-item{margin-bottom:20px}
.edu-meta{display:flex;gap:30px;margin-top:8px;color:#555665;font-size:12.4px}
.certifications{margin-top:4px}

.download-pdf-btn{position:fixed;right:24px;bottom:24px;z-index:9999;height:44px;border:0;border-radius:999px;background:#087882;color:#fff;font:inherit;font-size:14px;font-weight:800;padding:0 18px;cursor:pointer;box-shadow:0 12px 30px rgba(15,23,42,.22)}
body.template-builder-ready{min-width:0;overflow-x:auto}
.builder-workspace{width:min(1340px,calc(100% - 32px));margin:22px auto;display:grid;grid-template-columns:minmax(0,1fr) 390px;gap:24px;align-items:start}
.builder-preview{min-width:0;overflow:auto;display:flex;justify-content:flex-start;align-items:flex-start;padding-bottom:24px}
.builder-preview>.resume{flex:0 0 auto;margin:0!important}
.builder-panel{position:sticky;top:18px;max-height:calc(100vh - 36px);overflow-y:auto;background:#fff;border:1px solid #d9e1ea;border-radius:8px;box-shadow:0 18px 45px rgba(15,23,42,.13);color:#172033;font-family:Inter,"Segoe UI",Arial,sans-serif}
.builder-panel *{box-sizing:border-box}
.builder-panel-header{position:sticky;top:0;z-index:2;background:#fff;border-bottom:1px solid #e4ebf2;padding:16px 18px}
.builder-panel-top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
.builder-back{color:#087882;font-size:13px;font-weight:700;text-decoration:none}
.builder-lang{width:88px;height:34px;border:1px solid #cbd6e2;border-radius:6px;background:#f8fafc;color:#172033;font:inherit;font-size:13px;font-weight:700;padding:0 8px}
.builder-panel h2{display:block;margin:0;padding:0;border:0;color:#172033;font-size:22px;font-weight:800;line-height:1.15}
.builder-panel h2:after,.builder-panel h3:after{content:none!important}
.builder-section{padding:18px;border-bottom:1px solid #edf1f5}
.builder-section-title{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
.builder-section h3{margin:0;color:#172033;font-size:14px;font-weight:800}
.builder-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.builder-field{display:grid;gap:6px}
.builder-field.builder-wide{grid-column:1/-1}
.builder-field span{color:#5b6778;font-size:12px;font-weight:700}
.builder-field input,.builder-field textarea,.builder-field select{width:100%;border:1px solid #cfd9e5;border-radius:6px;background:#fbfdff;color:#172033;font:inherit;font-size:14px;line-height:1.35;padding:10px 11px;outline:none}
.builder-field textarea{min-height:86px;resize:vertical}
.builder-entry{display:grid;gap:12px;padding:14px;border:1px solid #e2e8f0;border-radius:8px;background:#f8fafc;margin-bottom:12px}
.builder-entry-actions{display:flex;justify-content:flex-end}
.builder-button{height:34px;border:1px solid #087882;border-radius:6px;background:#087882;color:#fff;cursor:pointer;font:inherit;font-size:13px;font-weight:800;padding:0 13px}
.builder-button.builder-secondary{border-color:#cbd6e2;background:#fff;color:#425069}
.builder-button:disabled{cursor:not-allowed;opacity:.45}

@media(max-width:1240px){.builder-workspace{grid-template-columns:minmax(0,1fr)}.builder-panel{position:static;max-height:none;order:-1}}
@media(max-width:900px){.resume{width:100%;height:auto;min-height:100vh;margin:0}.header{height:auto;padding-bottom:24px}.photo{position:static;margin-top:18px}.contact{width:100%;grid-template-columns:1fr}.main{grid-template-columns:1fr}.summary p{width:auto}.job-head{grid-template-columns:1fr}.date{text-align:left}.builder-grid{grid-template-columns:1fr}}

@media print{
@page{size:A4;margin:0}
html,body{width:210mm;height:297mm;margin:0!important;padding:0!important;background:#fff!important;overflow:hidden!important}
.download-pdf-btn,.builder-panel{display:none!important}
.builder-workspace,.builder-preview{display:block!important;width:210mm!important;height:297mm!important;margin:0!important;padding:0!important;overflow:hidden!important}
.resume{width:210mm!important;height:297mm!important;margin:0!important;overflow:hidden!important}
.header{height:52mm!important;padding:8mm 9mm 0!important}
.header h1{font-size:9.4mm!important;margin-bottom:2mm!important}
.role{font-size:4.2mm!important;margin-bottom:5.5mm!important}
.contact{grid-template-columns:33mm 33mm 31mm 1fr!important;gap:1.8mm 3mm!important;width:148mm!important;font-size:2.8mm!important}
.photo{right:9mm!important;top:8mm!important;width:31mm!important;height:31mm!important}
.main{display:grid!important;grid-template-columns:67mm 1fr!important;gap:8mm!important;padding:5.5mm 9mm 7mm!important}
section{margin-bottom:5.8mm!important}
h2{font-size:4.7mm!important;margin-bottom:3.6mm!important;gap:3mm!important}
p{font-size:2.85mm!important;line-height:1.32!important}
.summary p{width:56mm!important}
.pill{min-width:36mm!important;height:6mm!important;font-size:2.8mm!important;padding:0 3mm!important}
.skill-pills{gap:3.8mm!important}
.language-row{font-size:2.9mm!important;margin-bottom:4.7mm!important}
.dot{width:2.8mm!important;height:2.8mm!important}
.level{font-size:2.6mm!important}
li{font-size:2.75mm!important;line-height:1.28!important;margin-bottom:.7mm!important}
.job{margin-bottom:5mm!important}
.job-head{grid-template-columns:1fr 34mm!important;gap:4mm!important;margin-bottom:1.6mm!important}
h3{font-size:3.45mm!important}
.company,.school{font-size:3.1mm!important}
.place,.date,.edu-meta{font-size:2.75mm!important}
.edu-item{margin-bottom:4.2mm!important}
}
</style>
</head>

<body>

<button class="download-pdf-btn" type="button" onclick="downloadPDF()">Download PDF</button>

<script>

};

const DEFAULTS={
en:{
fields:{fullName:"John Bennett",jobTitle:"Chief Marketing Officer",phone:"321-554-8877",email:"321-554-8877",location:"Stanford, CA",linkedin:"https://linkedin.com/in/taylorparker",website:"https://madisonbennett.me",photoData:"",summary:"Passionate Software Engineer with 10+ years of experience in developing web applications and backend systems. Skilled at writing clear, concise code that is easy to maintain and troubleshoot. Experienced in working with both small and large teams across multiple projects and companies."},

languages:[{name:"English",dots:5,level:"Native"},{name:"Spanish",dots:4,level:"Fluent"}],
achievements:[{value:"Spearheaded a $12M software project, from design to distribution as a senior software engineer in a 12-people team"},{value:"Coordinated a year-long release of a six-part platform project"}],
experience:[{role:"Senior Software Engineer",company:"Google",date:"Jan 2020 - Present",place:"Stanford, CA",details:"Developed design deliverables that elevated, differentiated, and functioned on-brand and on-strategy.\nManaged multiple design projects simultaneously, ensuring timely delivery within budget constraints.\nCreated compelling visual presentations to effectively communicate complex ideas to clients and stakeholders.\nDeveloped and maintained comprehensive library of design assets for easy access and reuse."},{role:"Product Team Lead",company:"Dropbox",date:"Nov 2018 - Dec 2019",place:"Mountain View, CA",details:"Developed design deliverables that elevated, differentiated, and functioned on-brand and on-strategy.\nManaged multiple design projects simultaneously, ensuring timely delivery within budget constraints.\nCreated compelling visual presentations to effectively communicate complex ideas to clients and stakeholders."}],
education:[{degree:"Master of Science in Computer Science",school:"Stanford University",date:"2016 - 2018",place:"Stanford, CA"},{degree:"Bachelor of Science in Computer Science",school:"Carnegie Mellon University",date:"2013 - 2016",place:"Pittsburgh, PA"}],
certifications:[{value:"Certified Scrum Master by Atlassian\nIssued Jun 2017"},{value:"Certified React Native Developer\nIssued May 2019"}]
}},

collections:{
skills:[{value:"Backend dasturlash"},{value:"Frontend dasturlash"},{value:"Ma'lumotlar bazalari"},{value:"Machine Learning"},{value:"UX dizayn"}],
languages:[{name:"Ingliz tili",dots:5,level:"Native"},{name:"Ispan tili",dots:4,level:"Ravon"}],
achievements:[{value:"12 million dollarlik dasturiy loyiha jarayonini boshqargan"},{value:"Olti qismli platforma loyihasining reliz jarayonini muvofiqlashtirgan"}],
experience:[{role:"Katta dasturiy ta'minot muhandisi",company:"Google",date:"Yan 2020 - Hozir",place:"Stanford, CA",details:"Brend va strategiyaga mos dizayn materiallarini ishlab chiqdi.\nBir nechta loyihalarni bir vaqtda boshqarib, muddatlarga rioya qildi.\nMurakkab g'oyalarni tushunarli yetkazish uchun taqdimotlar yaratdi."}],
education:[{degree:"Kompyuter fanlari magistri",school:"Stanford Universiteti",date:"2016 - 2018",place:"Stanford, CA"}],
certifications:[{value:"Atlassian tomonidan Certified Scrum Master\nBerilgan: Iyun 2017"}]
}},

fields:{fullName:"John Bennett",jobTitle:"Директор по маркетингу",phone:"321-554-8877",email:"321-554-8877",location:"Stanford, CA",linkedin:"https://linkedin.com/in/taylorparker",website:"https://madisonbennett.me",photoData:"",summary:"Специалист с опытом более 10 лет в разработке веб-приложений и backend-систем. Создает понятные и поддерживаемые решения."},
collections:{
skills:[{value:"Backend-разработка"},{value:"Frontend-разработка"},{value:"Базы данных"},{value:"Machine Learning"},{value:"UX-дизайн"}],
languages:[{name:"Английский",dots:5,level:"Носитель"},{name:"Испанский",dots:4,level:"Свободный"}],
achievements:[{value:"Руководил программным проектом стоимостью $12M от дизайна до запуска"},{value:"Координировал годовой релиз платформенного проекта"}],
experience:[{role:"Старший инженер ПО",company:"Google",date:"Янв 2020 - Настоящее время",place:"Stanford, CA",details:"Разрабатывал материалы, соответствующие бренду и стратегии.\nУправлял несколькими проектами одновременно.\nСоздавал визуальные презентации для клиентов."}],
education:[{degree:"Магистр компьютерных наук",school:"Стэнфордский университет",date:"2016 - 2018",place:"Stanford, CA"}],
certifications:[{value:"Certified Scrum Master от Atlassian\nВыдано: июнь 2017"}]
}}
};

let language=localStorage.getItem("cv-maker-language")||"en";
if(!DEFAULTS[language])language="en";
let state=clone(DEFAULTS[language]),panel;
document.addEventListener("DOMContentLoaded",init);

function init(){
const resume=document.querySelector(".resume"),workspace=document.createElement("main"),preview=document.createElement("div");
workspace.className="builder-workspace";preview.className="builder-preview";panel=document.createElement("aside");panel.className="builder-panel";
resume.parentNode.insertBefore(workspace,resume);preview.appendChild(resume);workspace.appendChild(preview);workspace.appendChild(panel);
document.body.classList.add("template-builder-ready");
renderPanel();renderResume();bindEvents();
}

function t(k){return TEXT[language]?.[k]||TEXT.en[k]||k}

function bindEvents(){
panel.addEventListener("input",e=>{
const input=e.target;
if(input.matches("[data-field]")){state.fields[input.dataset.field]=input.value;renderResume()}
if(input.matches("[data-collection]")){
const item=state.collections[input.dataset.collection][Number(input.dataset.index)];
if(item){item[input.dataset.key]=input.value;renderResume()}
}
});

panel.addEventListener("change",e=>{
const input=e.target;
if(input.matches("[data-photo-upload]")){
const file=input.files&&input.files[0];if(!file)return;
const reader=new FileReader();
reader.onload=()=>{state.fields.photoData=reader.result;renderResume()};
reader.readAsDataURL(file);return;
}
if(input.matches("[data-builder-language]")){
language=input.value;localStorage.setItem("cv-maker-language",language);
state=clone(DEFAULTS[language]);renderPanel();renderResume();
}
});

panel.addEventListener("click",e=>{
const add=e.target.closest("[data-add]"),remove=e.target.closest("[data-remove]"),back=e.target.closest("[data-builder-back]");
if(back){e.preventDefault();if(window.history.length>1)window.history.back();return}
if(add){state.collections[add.dataset.add].push(blank(add.dataset.add));renderPanel();renderResume()}
if(remove){const arr=state.collections[remove.dataset.remove];if(arr.length>1){arr.splice(Number(remove.dataset.index),1);renderPanel();renderResume()}}
});
}

function blank(type){
if(type==="experience")return{role:"",company:"",date:"",place:"",details:""};
if(type==="education")return{degree:"",school:"",date:"",place:""};
if(type==="languages")return{name:"",dots:3,level:""};
return{value:""};
}

function renderPanel(){
panel.innerHTML=`
<header class="builder-panel-header">
<div class="builder-panel-top">
<a class="builder-back" href="/" data-builder-back>${t("back")}</a>
<select class="builder-lang" data-builder-language>
<option value="en"${language==="en"?" selected":""}>EN</option>
<option value="uz"${language==="uz"?" selected":""}>UZ</option>
<option value="ru"${language==="ru"?" selected":""}>RU</option>
</select>
</div>
<h2>${t("builder")}</h2>
</header>

<section class="builder-section">
<div class="builder-section-title"><h3>${t("personal")}</h3></div>
<div class="builder-grid">
${field(t("fullName"),"fullName",state.fields.fullName)}
${field(t("jobTitle"),"jobTitle",state.fields.jobTitle)}
${field(t("phone"),"phone",state.fields.phone)}
${field(t("email"),"email",state.fields.email)}
${field(t("location"),"location",state.fields.location,true)}
${field(t("linkedin"),"linkedin",state.fields.linkedin,true)}
${field(t("website"),"website",state.fields.website,true)}
<label class="builder-field builder-wide"><span>${t("photoUpload")}</span><input type="file" accept="image/*" data-photo-upload></label>
</div>
</section>

<section class="builder-section">
<div class="builder-section-title"><h3>${t("summary")}</h3></div>
${field(t("summary"),"summary",state.fields.summary,true,"textarea")}
</section>

${section("skills",t("skills"),simpleEntry,t("skill"))}
${section("languages",t("languages"),languageEntry)}
${section("achievements",t("achievements"),simpleEntry,t("achievement"))}
${section("experience",t("experience"),expEntry)}
${section("education",t("education"),eduEntry)}
${section("certifications",t("certifications"),simpleEntry,t("certification"))}
`;
}

function field(label,key,value,wide,type){
const c=type==="textarea"?`<textarea data-field="${key}">${esc(value)}</textarea>`:`<input data-field="${key}" value="${attr(value)}">`;
return`<label class="builder-field${wide?" builder-wide":""}"><span>${label}</span>${c}</label>`;
}

function section(type,title,renderer,label){
return`<section class="builder-section"><div class="builder-section-title"><h3>${title}</h3><button class="builder-button" type="button" data-add="${type}">${t("add")}</button></div>${state.collections[type].map((e,i)=>renderer(type,e,i,label)).join("")}</section>`;
}

function expEntry(type,e,i){
return`<div class="builder-entry"><div class="builder-grid">${cf(t("role"),type,i,"role",e.role)}${cf(t("company"),type,i,"company",e.company)}${cf(t("date"),type,i,"date",e.date)}${cf(t("place"),type,i,"place",e.place)}${cf(t("details"),type,i,"details",e.details,true,"textarea")}</div>${removeBtn(type,i)}</div>`;
}

function eduEntry(type,e,i){
return`<div class="builder-entry"><div class="builder-grid">${cf(t("degree"),type,i,"degree",e.degree)}${cf(t("school"),type,i,"school",e.school)}${cf(t("date"),type,i,"date",e.date)}${cf(t("place"),type,i,"place",e.place)}</div>${removeBtn(type,i)}</div>`;
}

function languageEntry(type,e,i){
return`<div class="builder-entry"><div class="builder-grid">${cf(t("language"),type,i,"name",e.name)}${cf(t("level"),type,i,"level",e.level)}${cf(t("dots"),type,i,"dots",e.dots,true)}</div>${removeBtn(type,i)}</div>`;
}

function simpleEntry(type,e,i,label){
return`<div class="builder-entry">${cf(label,type,i,"value",e.value,true,"textarea")}${removeBtn(type,i)}</div>`;
}

function cf(label,type,i,key,value,wide,kind){
const attrs=`data-collection="${type}" data-index="${i}" data-key="${key}"`;
const c=kind==="textarea"?`<textarea ${attrs}>${esc(value)}</textarea>`:`<input ${attrs} value="${attr(value)}">`;
return`<label class="builder-field${wide?" builder-wide":""}"><span>${label}</span>${c}</label>`;
}

function removeBtn(type,i){
return`<div class="builder-entry-actions"><button class="builder-button builder-secondary" type="button" data-remove="${type}" data-index="${i}"${state.collections[type].length<=1?" disabled":""}>${t("remove")}</button></div>`;
}

function renderResume(){
document.querySelector(".download-pdf-btn").textContent=t("downloadPDF");
document.querySelector(".header h1").textContent=state.fields.fullName;
document.querySelector(".role").textContent=state.fields.jobTitle;
document.querySelector(".photo").src=state.fields.photoData||"{% static 'images/default-profile.png' %}";
document.querySelector(".contact").innerHTML=`<span>📞&nbsp; ${esc(state.fields.phone)}</span><span>✉&nbsp; ${esc(state.fields.email)}</span><span>📍&nbsp; ${esc(state.fields.location)}</span><span></span><span class="link">in&nbsp; ${esc(state.fields.linkedin)}</span><span class="link">🔗&nbsp; ${esc(state.fields.website)}</span>`;
document.querySelector(".summary h2").textContent=t("summary");
document.querySelector(".summary p").textContent=state.fields.summary;
renderSkills();renderLanguages();renderList(".achievements ul",state.collections.achievements,false);document.querySelector(".achievements h2").textContent=t("achievements");
renderExperience();renderEducation();renderList(".certifications ul",state.collections.certifications,true);document.querySelector(".certifications h2").textContent=t("certifications");
}

function renderSkills(){
document.querySelector(".skills h2").textContent=t("skills");
const box=document.querySelector(".skill-pills");box.innerHTML="";
state.collections.skills.filter(hasValue).forEach(s=>{
const div=document.createElement("div");div.className="pill";div.textContent=s.value;box.appendChild(div);
});
}

function renderLanguages(){
document.querySelector(".language h2").textContent=t("languages");
const box=document.querySelector(".languages-list");box.innerHTML="";
state.collections.languages.filter(hasValue).forEach(l=>{
const dots=Math.max(0,Math.min(5,Number(l.dots)||0));
const div=document.createElement("div");div.className="language-row";
div.innerHTML=`<div>${esc(l.name)}</div><div><div class="dots">${[1,2,3,4,5].map(n=>`<span class="dot${n<=dots?" on":""}"></span>`).join("")}</div><div class="level">${esc(l.level)}</div></div>`;
box.appendChild(div);
});
}

function renderExperience(){
const box=document.querySelector(".experience");box.innerHTML=`<h2>${t("experience")}</h2>`;
state.collections.experience.filter(hasValue).forEach(e=>{
const div=document.createElement("div");div.className="job";
div.innerHTML=`<div class="job-head"><div><h3>${esc(e.role)}</h3><div class="company">${esc(e.company)}</div><div class="place">${esc(e.place)}</div></div><div class="date">${esc(e.date)}</div></div><ul>${lines(e.details).map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`;
box.appendChild(div);
});
}

function renderEducation(){
const box=document.querySelector(".education");box.innerHTML=`<h2>${t("education")}</h2>`;
state.collections.education.filter(hasValue).forEach(e=>{
const div=document.createElement("div");div.className="edu-item";
div.innerHTML=`<h3>${esc(e.degree)}</h3><div class="school">${esc(e.school)}</div><div class="edu-meta"><span>${esc(e.date)}</span><span>${esc(e.place)}</span></div>`;
box.appendChild(div);
});
}

function renderList(selector,arr,multi){
const ul=document.querySelector(selector);ul.innerHTML="";
arr.filter(hasValue).forEach(e=>{
const li=document.createElement("li");
li.innerHTML=multi?esc(e.value).replace(/\n/g,"<br>"):esc(e.value);
ul.appendChild(li);
});
}

function hasValue(o){return Object.values(o).some(v=>String(v||"").trim())}
function lines(v){return String(v||"").split("\n").map(x=>x.trim()).filter(Boolean)}
function clone(v){return JSON.parse(JSON.stringify(v))}
function esc(v){return String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function attr(v){return esc(v).replace(/"/g,"&quot;")}
})();
</script>
</body>
</html>
