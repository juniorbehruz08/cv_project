{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Taylor Parker Resume - Prestige Builder</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#d8d8d8;font-family:Georgia,"Times New Roman",serif;color:#202333}
.resume{width:850px;height:1130px;margin:22px auto;background:#fff;display:grid;grid-template-columns:537px 313px;overflow:hidden}
.left{padding:42px 29px 32px 36px;background:#fff}
header{margin-bottom:31px}
h1{font-size:30px;line-height:1;font-weight:700;color:#202333;letter-spacing:-.25px;margin-bottom:8px}
.role{font-size:14.5px;color:#08709d;line-height:1.1}
section{margin-bottom:30px}
h2{font-size:21px;line-height:1;font-weight:700;color:#202333;display:flex;align-items:center;gap:12px;margin-bottom:16px}
h2:after{content:"";flex:1;height:1px;background:#d8d8d8;transform:translateY(2px)}
p{font-size:12.25px;line-height:1.45;color:#424753}
.job{margin-bottom:23px}
.job-head{display:grid;grid-template-columns:1fr 148px;gap:16px;margin-bottom:8px}
h3{font-size:14.7px;line-height:1.18;font-weight:700;color:#1f2230;margin-bottom:4px}
.company,.school{font-size:13.6px;line-height:1.15;color:#08709d;margin-bottom:4px}
.date{color:#4e535f;font-size:11.8px;text-align:right;line-height:1.45}
ul{padding-left:17px}
li{font-size:11.75px;line-height:1.42;color:#424753;margin-bottom:4px}
.edu-item{margin-bottom:20px}
.edu-meta{display:flex;gap:31px;color:#4e535f;font-size:11.8px;margin-top:8px}
.achievements{margin-top:4px}
.right{background:#11121b;color:#fff;padding:50px 36px 30px 27px}
.side-section{margin-bottom:32px}
.side-title{color:#fff;font-size:21px;line-height:1;font-weight:700;display:flex;align-items:center;gap:12px;margin-bottom:17px}
.side-title:after{content:"";flex:1;height:1px;background:rgba(255,255,255,.18);transform:translateY(2px)}
.contact-item{color:#e1e3e8;font-size:12px;line-height:1;margin-bottom:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.skill{margin-bottom:20px}
.skill-top{display:grid;grid-template-columns:1fr auto;column-gap:10px;align-items:start;color:#eeeef3;font-size:12.2px;margin-bottom:3px}
.dots{display:flex;gap:5px}
.dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.14)}
.dot.on{background:#43b8e9}
.level{color:#dedfe5;font-size:11.5px;text-align:right;margin-top:2px}
.language-row{display:grid;grid-template-columns:1fr auto;align-items:start;margin-bottom:21px;color:#eeeeef;font-size:12.2px}
.right li{color:#eeeeef;font-size:11.8px;line-height:1.42;margin-bottom:4px}

.download-pdf-btn{position:fixed;right:24px;bottom:24px;z-index:9999;height:44px;border:0;border-radius:999px;background:#08709d;color:#fff;font:inherit;font-size:14px;font-weight:800;padding:0 18px;cursor:pointer;box-shadow:0 12px 30px rgba(15,23,42,.22)}
body.template-builder-ready{min-width:0;overflow-x:auto}
.builder-workspace{width:min(1340px,calc(100% - 32px));margin:22px auto;display:grid;grid-template-columns:minmax(0,1fr) 390px;gap:24px;align-items:start}
.builder-preview{min-width:0;overflow:auto;display:flex;justify-content:flex-start;align-items:flex-start;padding-bottom:24px}
.builder-preview>.resume{flex:0 0 auto;margin:0!important}
.builder-panel{position:sticky;top:18px;max-height:calc(100vh - 36px);overflow-y:auto;background:#fff;border:1px solid #d9e1ea;border-radius:8px;box-shadow:0 18px 45px rgba(15,23,42,.13);color:#172033;font-family:Inter,"Segoe UI",Arial,sans-serif}
.builder-panel *{box-sizing:border-box}
.builder-panel-header{position:sticky;top:0;z-index:2;background:#fff;border-bottom:1px solid #e4ebf2;padding:16px 18px}
.builder-panel-top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
.builder-back{color:#08709d;font-size:13px;font-weight:700;text-decoration:none}
.builder-lang{width:88px;height:34px;border:1px solid #cbd6e2;border-radius:6px;background:#f8fafc;color:#172033;font:inherit;font-size:13px;font-weight:700;padding:0 8px}
.builder-panel h2{display:block;margin:0;padding:0;border:0;color:#172033;font-size:22px;font-weight:800;line-height:1.15}
.builder-panel h2:after,.builder-panel h3:after{content:none!important}
.builder-section{padding:18px;border-bottom:1px solid #edf1f5}
.builder-section-title{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
.builder-section h3{margin:0;color:#172033;font-size:14px;font-weight:800}
.builder-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.builder-field{display:grid;gap:6px}
.builder-field.builder-wide{grid-column:1/-1}
.builder-field span{color:#5b6778;font-size:12px;font-weight:700}
.builder-field input,.builder-field textarea{width:100%;border:1px solid #cfd9e5;border-radius:6px;background:#fbfdff;color:#172033;font:inherit;font-size:14px;line-height:1.35;padding:10px 11px;outline:none}
.builder-field textarea{min-height:86px;resize:vertical}
.builder-entry{display:grid;gap:12px;padding:14px;border:1px solid #e2e8f0;border-radius:8px;background:#f8fafc;margin-bottom:12px}
.builder-entry-actions{display:flex;justify-content:flex-end}
.builder-button{height:34px;border:1px solid #08709d;border-radius:6px;background:#08709d;color:#fff;cursor:pointer;font:inherit;font-size:13px;font-weight:800;padding:0 13px}
.builder-button.builder-secondary{border-color:#cbd6e2;background:#fff;color:#425069}
.builder-button:disabled{cursor:not-allowed;opacity:.45}

@media(max-width:1240px){.builder-workspace{grid-template-columns:minmax(0,1fr)}.builder-panel{position:static;max-height:none;order:-1}}
@media(max-width:900px){.resume{width:100%;height:auto;min-height:100vh;margin:0;grid-template-columns:1fr}.builder-grid{grid-template-columns:1fr}.job-head{grid-template-columns:1fr}.date{text-align:left}}

@media print{
@page{size:A4;margin:0}
html,body{width:210mm;height:297mm;margin:0!important;padding:0!important;background:#fff!important;overflow:hidden!important}
.download-pdf-btn,.builder-panel{display:none!important}
.builder-workspace,.builder-preview{display:block!important;width:210mm!important;height:297mm!important;margin:0!important;padding:0!important;overflow:hidden!important}
.resume{width:210mm!important;height:297mm!important;margin:0!important;display:grid!important;grid-template-columns:132mm 78mm!important;overflow:hidden!important}
.left{padding:10mm 7mm 7mm 9mm!important}
.right{padding:12mm 8mm 7mm 7mm!important}
header{margin-bottom:7mm!important}
h1{font-size:7.3mm!important}
.role{font-size:3.45mm!important}
section{margin-bottom:6.4mm!important}
h2,.side-title{font-size:4.8mm!important;margin-bottom:3.6mm!important}
p{font-size:2.78mm!important;line-height:1.33!important}
.job{margin-bottom:5mm!important}
.job-head{grid-template-columns:1fr 36mm!important;gap:4mm!important}
h3{font-size:3.35mm!important}
.company,.school{font-size:3.05mm!important}
.date,.edu-meta{font-size:2.65mm!important}
li{font-size:2.62mm!important;line-height:1.28!important}
.side-section{margin-bottom:7mm!important}
.contact-item{font-size:2.75mm!important;margin-bottom:3mm!important}
.skill{margin-bottom:4.6mm!important}
.skill-top,.language-row{font-size:2.75mm!important}
.dot{width:2.7mm!important;height:2.7mm!important}
.level{font-size:2.55mm!important}
}
</style>
</head>

en:{fields:{fullName:"Taylor Parker",jobTitle:"Senior Software Engineer | Product Team Lead",phone:"321-554-8877",email:"321-554-8877",location:"Philadelphia, Pennsylvania",github:"https://github.com/tlrpkr_hack",summary:"Passionate Software Engineer with 10+ years of experience in developing web applications and backend systems. Skilled at writing clear, concise code that is easy to maintain and troubleshoot. Experienced in working with both small and large teams across multiple projects and companies. Able to work independently of remote locations or in office environments as needed by the company."},collections:{experience:[{role:"Senior Software Engineer",company:"Google",date:"Jan 2020 - Present",place:"London, United Kingdom",details:"Developed design deliverables that elevated, differentiated, and functioned on-brand and on-strategy.\nManaged multiple design projects simultaneously, ensuring timely delivery within budget constraints.\nCreated compelling visual presentations to effectively communicate complex ideas to clients and stakeholders.\nDeveloped and maintained comprehensive library of design assets for easy access and reuse."},{role:"Product Team Lead",company:"Dropbox",date:"Nov 2018 - Dec 2019",place:"Mountain View, CA",details:"Developed design deliverables that elevated, differentiated, and functioned on-brand and on-strategy.\nManaged multiple design projects simultaneously, ensuring timely delivery within budget constraints.\nCreated compelling visual presentations to effectively communicate complex ideas to clients and stakeholders."}],education:[{degree:"Master of Science in Computer Science",school:"Stanford University",date:"2016 - 2018",place:"Stanford, CA"},{degree:"Bachelor of Science in Computer Science",school:"Carnegie Mellon University",date:"2013 - 2016",place:"Pittsburgh, PA"}],achievements:[{value:"Spearheaded a $12M software project, from design to distribution as a senior software engineer in a 12-people team"},{value:"Coordinated a year-long release of a six-part platform project"}],skills:[{name:"Back-end development",dots:5,level:"Expert"},{name:"Front-end development",dots:4,level:"Advanced"},{name:"Data Bases",dots:4,level:"Advanced"},{name:"Machine Learning",dots:3,level:"Proficient"},{name:"UX Design",dots:1,level:"Beginner"}],languages:[{name:"English",dots:5,level:"Native"},{name:"Spanish",dots:4,level:"Fluent"}],certifications:[{value:"Certified Scrum Master by Atlassian\nIssued Jun 2017"},{value:"Certified React Native Developer\nIssued May 2019"},{value:"Certified Apple Developer\nIssued Apr 2021"}]}},

};

let language=localStorage.getItem("cv-maker-language")||"en";
if(!DEFAULTS[language])language="en";
let state=clone(DEFAULTS[language]),panel;
document.addEventListener("DOMContentLoaded",init);

function init(){
const resume=document.querySelector(".resume"),workspace=document.createElement("main"),preview=document.createElement("div");
workspace.className="builder-workspace";preview.className="builder-preview";panel=document.createElement("aside");panel.className="builder-panel";
resume.parentNode.insertBefore(workspace,resume);preview.appendChild(resume);workspace.appendChild(preview);workspace.appendChild(panel);
document.body.classList.add("template-builder-ready");
renderPanel();renderResume();bindEvents();
}

function t(k){return TEXT[language]?.[k]||TEXT.en[k]||k}
function bindEvents(){
panel.addEventListener("input",e=>{
const input=e.target;
if(input.matches("[data-field]")){state.fields[input.dataset.field]=input.value;renderResume()}
if(input.matches("[data-collection]")){
const item=state.collections[input.dataset.collection][Number(input.dataset.index)];
if(item){item[input.dataset.key]=input.value;renderResume()}
}
});
panel.addEventListener("change",e=>{
const input=e.target;
if(input.matches("[data-builder-language]")){
language=input.value;localStorage.setItem("cv-maker-language",language);
state=clone(DEFAULTS[language]);renderPanel();renderResume();
}
});
panel.addEventListener("click",e=>{
const add=e.target.closest("[data-add]"),remove=e.target.closest("[data-remove]"),back=e.target.closest("[data-builder-back]");
if(back){e.preventDefault();if(window.history.length>1)window.history.back();return}
if(add){state.collections[add.dataset.add].push(blank(add.dataset.add));renderPanel();renderResume()}
if(remove){const arr=state.collections[remove.dataset.remove];if(arr.length>1){arr.splice(Number(remove.dataset.index),1);renderPanel();renderResume()}}
});
}

function blank(type){
if(type==="experience")return{role:"",company:"",date:"",place:"",details:""};
if(type==="education")return{degree:"",school:"",date:"",place:""};
if(type==="skills"||type==="languages")return{name:"",dots:3,level:""};
return{value:""};
}

function renderPanel(){
panel.innerHTML=`
<header class="builder-panel-header">
<div class="builder-panel-top">
<a class="builder-back" href="/" data-builder-back>${t("back")}</a>
<select class="builder-lang" data-builder-language>
<option value="en"${language==="en"?" selected":""}>EN</option>
<option value="uz"${language==="uz"?" selected":""}>UZ</option>
<option value="ru"${language==="ru"?" selected":""}>RU</option>
</select>
</div>
<h2>${t("builder")}</h2>
</header>

<section class="builder-section">
<div class="builder-section-title"><h3>${t("personal")}</h3></div>
<div class="builder-grid">
${field(t("fullName"),"fullName",state.fields.fullName)}
${field(t("jobTitle"),"jobTitle",state.fields.jobTitle)}
${field(t("phone"),"phone",state.fields.phone)}
${field(t("email"),"email",state.fields.email)}
${field(t("location"),"location",state.fields.location,true)}
${field(t("github"),"github",state.fields.github,true)}
</div>
</section>

<section class="builder-section"><div class="builder-section-title"><h3>${t("summary")}</h3></div>${field(t("summary"),"summary",state.fields.summary,true,"textarea")}</section>
${section("experience",t("experience"),expEntry)}
${section("education",t("education"),eduEntry)}
${section("achievements",t("achievements"),simpleEntry,t("achievement"))}
${section("skills",t("skills"),ratingEntry)}
${section("languages",t("languages"),languageEntry)}
${section("certifications",t("certifications"),simpleEntry,t("certification"))}
`;
}

function field(label,key,value,wide,type){
const c=type==="textarea"?`<textarea data-field="${key}">${esc(value)}</textarea>`:`<input data-field="${key}" value="${attr(value)}">`;
return`<label class="builder-field${wide?" builder-wide":""}"><span>${label}</span>${c}</label>`;
}

function section(type,title,renderer,label){
return`<section class="builder-section"><div class="builder-section-title"><h3>${title}</h3><button class="builder-button" type="button" data-add="${type}">${t("add")}</button></div>${state.collections[type].map((e,i)=>renderer(type,e,i,label)).join("")}</section>`;
}

function expEntry(type,e,i){
return`<div class="builder-entry"><div class="builder-grid">${cf(t("role"),type,i,"role",e.role)}${cf(t("company"),type,i,"company",e.company)}${cf(t("date"),type,i,"date",e.date)}${cf(t("place"),type,i,"place",e.place)}${cf(t("details"),type,i,"details",e.details,true,"textarea")}</div>${removeBtn(type,i)}</div>`;
}

function eduEntry(type,e,i){
return`<div class="builder-entry"><div class="builder-grid">${cf(t("degree"),type,i,"degree",e.degree)}${cf(t("school"),type,i,"school",e.school)}${cf(t("date"),type,i,"date",e.date)}${cf(t("place"),type,i,"place",e.place)}</div>${removeBtn(type,i)}</div>`;
}

function ratingEntry(type,e,i){
return`<div class="builder-entry"><div class="builder-grid">${cf(t("skill"),type,i,"name",e.name)}${cf(t("level"),type,i,"level",e.level)}${cf(t("dots"),type,i,"dots",e.dots,true)}</div>${removeBtn(type,i)}</div>`;
}

function languageEntry(type,e,i){
return`<div class="builder-entry"><div class="builder-grid">${cf(t("language"),type,i,"name",e.name)}${cf(t("level"),type,i,"level",e.level)}${cf(t("dots"),type,i,"dots",e.dots,true)}</div>${removeBtn(type,i)}</div>`;
}

function simpleEntry(type,e,i,label){
return`<div class="builder-entry">${cf(label,type,i,"value",e.value,true,"textarea")}${removeBtn(type,i)}</div>`;
}

function cf(label,type,i,key,value,wide,kind){
const attrs=`data-collection="${type}" data-index="${i}" data-key="${key}"`;
const c=kind==="textarea"?`<textarea ${attrs}>${esc(value)}</textarea>`:`<input ${attrs} value="${attr(value)}">`;
return`<label class="builder-field${wide?" builder-wide":""}"><span>${label}</span>${c}</label>`;
}

function removeBtn(type,i){
return`<div class="builder-entry-actions"><button class="builder-button builder-secondary" type="button" data-remove="${type}" data-index="${i}"${state.collections[type].length<=1?" disabled":""}>${t("remove")}</button></div>`;
}

function renderResume(){
document.querySelector(".download-pdf-btn").textContent=t("downloadPDF");
document.querySelector("h1").textContent=state.fields.fullName;
document.querySelector(".role").textContent=state.fields.jobTitle;
document.querySelector(".summary h2").textContent=t("summary");
document.querySelector(".summary p").textContent=state.fields.summary;
renderContact();renderExperience();renderEducation();renderList(".achievements ul",state.collections.achievements,false);document.querySelector(".achievements h2").textContent=t("achievements");
renderRatings(".skills-list",state.collections.skills);document.querySelector(".skills-section .side-title").textContent=t("skills");
renderRatings(".languages-list",state.collections.languages);document.querySelector(".languages-section .side-title").textContent=t("languages");
renderList(".certifications ul",state.collections.certifications,true);document.querySelector(".certifications .side-title").textContent=t("certifications");
}

function renderContact(){
document.querySelector(".contact-section .side-title").textContent=t("contactInfo");
document.querySelector(".contact-list").innerHTML=`<div class="contact-item">📞 ${esc(state.fields.phone)}</div><div class="contact-item">✉ ${esc(state.fields.email)}</div><div class="contact-item">📍 ${esc(state.fields.location)}</div><div class="contact-item">◔ ${esc(state.fields.github)}</div>`;
}

function renderExperience(){
const box=document.querySelector(".experience");box.innerHTML=`<h2>${t("experience")}</h2>`;
state.collections.experience.filter(hasValue).forEach(e=>{
const div=document.createElement("div");div.className="job";
div.innerHTML=`<div class="job-head"><div><h3>${esc(e.role)}</h3><div class="company">${esc(e.company)}</div></div><div class="date">${esc(e.date)}<br>${esc(e.place)}</div></div><ul>${lines(e.details).map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`;
box.appendChild(div);
});
}

function renderEducation(){
const box=document.querySelector(".education");box.innerHTML=`<h2>${t("education")}</h2>`;
state.collections.education.filter(hasValue).forEach(e=>{
const div=document.createElement("div");div.className="edu-item";
div.innerHTML=`<h3>${esc(e.degree)}</h3><div class="school">${esc(e.school)}</div><div class="edu-meta"><span>${esc(e.date)}</span><span>${esc(e.place)}</span></div>`;
box.appendChild(div);
});
}

function renderRatings(selector,arr){
const box=document.querySelector(selector);box.innerHTML="";
arr.filter(hasValue).forEach(s=>{
const dots=Math.max(0,Math.min(5,Number(s.dots)||0));
const div=document.createElement("div");
div.className=selector.includes("languages")?"language-row":"skill";
div.innerHTML=`<div class="skill-top"><span>${esc(s.name)}</span><div class="dots">${[1,2,3,4,5].map(n=>`<span class="dot${n<=dots?" on":""}"></span>`).join("")}</div></div><div class="level">${esc(s.level)}</div>`;
box.appendChild(div);
});
}

function renderList(selector,arr,multi){
const ul=document.querySelector(selector);ul.innerHTML="";
arr.filter(hasValue).forEach(e=>{
const li=document.createElement("li");
li.innerHTML=multi?esc(e.value).replace(/\n/g,"<br>"):esc(e.value);
ul.appendChild(li);
});
}

function hasValue(o){return Object.values(o).some(v=>String(v||"").trim())}
function lines(v){return String(v||"").split("\n").map(x=>x.trim()).filter(Boolean)}
function clone(v){return JSON.parse(JSON.stringify(v))}
function esc(v){return String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function attr(v){return esc(v).replace(/"/g,"&quot;")}
})();
</script>
